services:
  nginx:
    image: nginx:1.27-alpine
    container_name: frp-fnos-nginx
    ports:
      - "${FNOS_HTTP_PORT:-18088}:80"
    volumes:
      - ./nginx-fnos/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/fnos-nginx:/var/log/nginx
    depends_on:
      - api-server
      - admin-web
      - user-web
    restart: unless-stopped

  api-server:
    build:
      context: ..
      dockerfile: deploy/api-server-local.Dockerfile
    container_name: frp-fnos-api
    env_file: .env.fnos
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      SMTP_TLS: ${SMTP_TLS}
      SMTP_SKIP_VERIFY: ${SMTP_SKIP_VERIFY}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      EPAY_API_BASE: ${EPAY_API_BASE}
      EPAY_SUBMIT_URL: ${EPAY_SUBMIT_URL}
      EPAY_MAPI_URL: ${EPAY_MAPI_URL}
      EPAY_PID: ${EPAY_PID}
      EPAY_KEY: ${EPAY_KEY}
      EPAY_APP_KEY: ${EPAY_APP_KEY}
      EPAY_SITE_NAME: ${EPAY_SITE_NAME}
      FRP_TOKEN: ${FRP_TOKEN}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  admin-web:
    build:
      context: ..
      dockerfile: apps/admin-web/Dockerfile
    container_name: frp-fnos-admin-web
    restart: unless-stopped

  user-web:
    build:
      context: ..
      dockerfile: apps/user-web/Dockerfile
    container_name: frp-fnos-user-web
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: frp-fnos-postgres
    env_file: .env.fnos
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/fnos-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: frp-fnos-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - ./redis/fnos-data:/data
    restart: unless-stopped
