services:
  nginx:
    image: nginx:1.27-alpine
    container_name: frp-platform-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/letsencrypt:/etc/letsencrypt
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api-server
      - admin-web
      - user-web
      - frps
    restart: unless-stopped

  frps:
    image: snowdreamtech/frps:latest
    container_name: frp-platform-frps
    command: ["-c", "/etc/frp/frps.toml"]
    ports:
      - "7000:7000"
      - "20000-29999:20000-29999/tcp"
      - "30000-39999:30000-39999/udp"
    volumes:
      - ./frps/frps.toml:/etc/frp/frps.toml:ro
      - ./logs/frps:/var/log/frp
    restart: unless-stopped

  api-server:
    build:
      context: ..
      dockerfile: apps/api-server/Dockerfile
    container_name: frp-platform-api
    environment:
      HTTP_ADDR: ":8080"
    restart: unless-stopped

  admin-web:
    build:
      context: ..
      dockerfile: apps/admin-web/Dockerfile
    container_name: frp-platform-admin-web
    restart: unless-stopped

  user-web:
    build:
      context: ..
      dockerfile: apps/user-web/Dockerfile
    container_name: frp-platform-user-web
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: frp-platform-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: frp-platform-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - ./redis/data:/data
    restart: unless-stopped
