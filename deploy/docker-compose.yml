services:
  nginx:
    image: nginx:1.27-alpine
    container_name: frp-platform-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/letsencrypt:/etc/letsencrypt
      - ./frps:/app/runtime/frps:ro
      - ./logs/frps:/app/runtime/logs/frps
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api-server
      - admin-web
      - user-web
      - frps
    restart: unless-stopped

  frps:
    image: snowdreamtech/frps:latest
    container_name: frp-platform-frps
    command: ["-c", "/etc/frp/frps.toml"]
    ports:
      - "7000:7000"
      - "20000-29999:20000-29999/tcp"
      - "30000-39999:30000-39999/udp"
    volumes:
      - ./frps/frps.toml:/etc/frp/frps.toml:ro
      - ./logs/frps:/var/log/frp
    restart: unless-stopped

  api-server:
    build:
      context: ..
      dockerfile: apps/api-server/Dockerfile
    container_name: frp-platform-api
    env_file: .env
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      SMTP_TLS: ${SMTP_TLS}
      SMTP_SKIP_VERIFY: ${SMTP_SKIP_VERIFY}
      NGINX_CONF_DIR: ${NGINX_CONF_DIR}
      ACME_WEBROOT: ${ACME_WEBROOT}
      LETSENCRYPT_DIR: ${LETSENCRYPT_DIR}
      FRP_VHOST_UPSTREAM: ${FRP_VHOST_UPSTREAM}
      CERTBOT_BIN: ${CERTBOT_BIN}
      CERTBOT_DRY_RUN: ${CERTBOT_DRY_RUN}
      CERT_RENEW_BEFORE_DAYS: ${CERT_RENEW_BEFORE_DAYS}
      CERT_RENEW_INTERVAL: ${CERT_RENEW_INTERVAL}
      NGINX_TEST_CMD: ${NGINX_TEST_CMD}
      NGINX_RELOAD_CMD: ${NGINX_RELOAD_CMD}
      FRPS_CONFIG_PATH: ${FRPS_CONFIG_PATH}
      FRPS_LOG_PATH: ${FRPS_LOG_PATH}
      FRPS_STATUS_CMD: ${FRPS_STATUS_CMD}
      FRPS_RESTART_CMD: ${FRPS_RESTART_CMD}
      FRPS_RELOAD_CMD: ${FRPS_RELOAD_CMD}
    volumes:
      - ./nginx/conf.d:/app/runtime/nginx-conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/letsencrypt:/etc/letsencrypt
      - ./frps:/app/runtime/frps:ro
      - ./logs/frps:/app/runtime/logs/frps
    depends_on:
      - postgres
      - redis
      - mail-server
    restart: unless-stopped

  admin-web:
    build:
      context: ..
      dockerfile: apps/admin-web/Dockerfile
    container_name: frp-platform-admin-web
    restart: unless-stopped

  user-web:
    build:
      context: ..
      dockerfile: apps/user-web/Dockerfile
    container_name: frp-platform-user-web
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: frp-platform-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: frp-platform-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - ./redis/data:/data
    restart: unless-stopped


  mail-server:
    image: docker.io/mailserver/docker-mailserver:latest
    container_name: frp-platform-mail
    hostname: mail
    domainname: ${PLATFORM_DOMAIN}
    env_file: .env
    ports:
      - "25:25"
      - "587:587"
      - "993:993"
    volumes:
      - ./mail/data:/var/mail
      - ./mail/state:/var/mail-state
      - ./mail/logs:/var/log/mail
      - ./mail/config:/tmp/docker-mailserver
      - ./certbot/letsencrypt:/etc/letsencrypt:ro
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
