services:
  nginx:
    image: nginx:1.27-alpine
    container_name: frp-node-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-node/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-node/conf.d:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/letsencrypt:/etc/letsencrypt
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - frps
    restart: unless-stopped

  frps:
    image: snowdreamtech/frps:latest
    container_name: frp-node-frps
    command: ["-c", "/etc/frp/frps.toml"]
    ports:
      - "7000:7000"
      - "20000-29999:20000-29999/tcp"
      - "30000-39999:30000-39999/udp"
    volumes:
      - ./frps/frps.toml:/etc/frp/frps.toml:ro
      - ./logs/frps:/var/log/frp
    restart: unless-stopped

  node-agent:
    build:
      context: ..
      dockerfile: apps/node-agent/Dockerfile
    container_name: frp-node-agent
    env_file: .env.node
    environment:
      NODE_AGENT_ADDR: ":8090"
      NODE_AGENT_TOKEN: ${NODE_AGENT_TOKEN}
      NGINX_CONF_DIR: /app/runtime/nginx-conf.d
      ACME_WEBROOT: /var/www/certbot
      LETSENCRYPT_DIR: /etc/letsencrypt
      FRP_VHOST_UPSTREAM: http://frps:8080
      CERTBOT_BIN: certbot
      CERTBOT_DRY_RUN: ${CERTBOT_DRY_RUN}
      NGINX_TEST_CMD: ${NGINX_TEST_CMD}
      NGINX_RELOAD_CMD: ${NGINX_RELOAD_CMD}
      FRPS_CONFIG_PATH: /app/runtime/frps/frps.toml
      FRPS_LOG_PATH: /app/runtime/logs/frps/frps.log
      FRPS_STATUS_CMD: ${FRPS_STATUS_CMD}
      FRPS_RESTART_CMD: ${FRPS_RESTART_CMD}
      FRPS_RELOAD_CMD: ${FRPS_RELOAD_CMD}
    ports:
      - "8090:8090"
    volumes:
      - ./nginx-node/conf.d:/app/runtime/nginx-conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/letsencrypt:/etc/letsencrypt
      - ./frps:/app/runtime/frps:ro
      - ./logs/frps:/app/runtime/logs/frps
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - nginx
      - frps
    restart: unless-stopped
