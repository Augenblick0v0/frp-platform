# Server(FRPS) node-plane deployment
# frps + nginx + node-agent = Server(FRPS) Node Plane
services:
  nginx:
    image: nginx:1.27-alpine
    container_name: frp-node-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-node/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-node/conf.d:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/letsencrypt:/etc/letsencrypt
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - frps
    restart: unless-stopped

  frps:
    image: snowdreamtech/frps:latest
    entrypoint: ["/bin/sh", "-ec"]
    container_name: frp-node-frps
    command: [": \"$${FRP_TOKEN:?FRP_TOKEN is required}\"; sed \"s/__REPLACE_WITH_FRP_TOKEN__/$${FRP_TOKEN}/g\" /etc/frp/frps.template.toml > /tmp/frps.toml; exec /usr/bin/frps -c /tmp/frps.toml"]
    environment:
      FRP_TOKEN: ${FRP_TOKEN}
    ports:
      - "${FRP_BIND_PORT:-7000}:${FRP_BIND_PORT:-7000}"
      - "${TCP_PORT_START:-20000}-${TCP_PORT_END:-29999}:${TCP_PORT_START:-20000}-${TCP_PORT_END:-29999}/tcp"
      - "${UDP_PORT_START:-30000}-${UDP_PORT_END:-39999}:${UDP_PORT_START:-30000}-${UDP_PORT_END:-39999}/udp"
    volumes:
      - ./frps/frps.toml:/etc/frp/frps.template.toml:ro
      - ./logs/frps:/var/log/frp
    restart: unless-stopped

  node-agent:
    build:
      context: ..
      dockerfile: apps/node-agent/Dockerfile
    container_name: frp-node-agent
    environment:
      NODE_AGENT_ADDR: ":8090"
      NODE_AGENT_TOKEN: ${NODE_AGENT_TOKEN}
      NODE_BIND_TOKEN: ${NODE_BIND_TOKEN}
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL}
      NGINX_CONF_DIR: /app/runtime/nginx-conf.d
      ACME_WEBROOT: /var/www/certbot
      LETSENCRYPT_DIR: /etc/letsencrypt
      FRP_VHOST_UPSTREAM: http://frps:8080
      CERTBOT_BIN: certbot
      CERTBOT_DRY_RUN: ${CERTBOT_DRY_RUN}
      NGINX_TEST_CMD: ${NGINX_TEST_CMD}
      NGINX_RELOAD_CMD: ${NGINX_RELOAD_CMD}
      FRPS_CONFIG_PATH: /app/runtime/frps/frps.toml
      FRPS_LOG_PATH: /app/runtime/logs/frps/frps.log
      FRPS_STATUS_CMD: ${FRPS_STATUS_CMD}
      FRPS_RESTART_CMD: ${FRPS_RESTART_CMD}
      FRPS_RELOAD_CMD: ${FRPS_RELOAD_CMD}
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - ./nginx-node/conf.d:/app/runtime/nginx-conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/letsencrypt:/etc/letsencrypt
      - ./frps:/app/runtime/frps:ro
      - ./logs/frps:/app/runtime/logs/frps
    depends_on:
      - nginx
      - frps
    restart: unless-stopped
