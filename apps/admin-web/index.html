<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FRP Platform Admin</title>
  <link rel="stylesheet" href="style.css?v=side-left-20260707-2">
</head>
<body>
<div id="adminApp"></div>
<script>
const $ = id => document.getElementById(id);
const app = $('adminApp');
const state = {
  token: localStorage.getItem('adminToken') || '',
  apiBase: location.origin,
  sidebarCollapsed: localStorage.getItem('adminSidebarCollapsedV2') !== 'false',
  dashboard: null,
  users: [],
  plans: [],
  tunnels: [],
  nodes: [],
  certificates: [],
  operations: [],
  settings: null,
  logLines: ['ready'],
};
const adminRoutes = [
  { path: '/dashboard', label: '仪表盘', desc: '平台核心指标' },
  { path: '/users', label: '用户管理', desc: '账号与状态' },
  { path: '/plans', label: '套餐管理', desc: '售卖套餐' },
  { path: '/redeem', label: '兑换码', desc: '批量生成' },
  { path: '/tunnels', label: '隧道管理', desc: '全部映射' },
  { path: '/nodes', label: '节点管理', desc: '边缘节点' },
  { path: '/certificates', label: '域名证书', desc: 'HTTPS 运维' },
  { path: '/settings', label: '系统设置', desc: '服务参数' },
  { path: '/logs', label: '操作日志', desc: '审计记录' },
];
function h(value) { return String(value ?? '').replace(/[&<>'"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch])); }
function route() { return location.hash.replace(/^#/, '') || '/'; }
function navigate(path) { if (route() === path) render(); else location.hash = path; }
function normalizeRoute(path) {
  if (!path || path === '/') return state.token ? '/dashboard' : '/login';
  if (path !== '/login' && !state.token) return '/login';
  if (path === '/login' && state.token) return '/dashboard';
  return adminRoutes.some(item => item.path === path) || path === '/login' ? path : '/dashboard';
}
function apiOrigin() {
  state.apiBase = location.origin;
  return state.apiBase.replace(/\/$/, '');
}
function toggleAdminSidebar() {
  state.sidebarCollapsed = !state.sidebarCollapsed;
  localStorage.setItem('adminSidebarCollapsedV2', String(state.sidebarCollapsed));
  render();
}
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (state.token) headers.Authorization = 'Bearer ' + state.token;
  const response = await fetch(apiOrigin() + path, { ...opts, headers });
  const json = await response.json().catch(() => ({ success: false, message: response.statusText }));
  if (!response.ok || json.success === false) throw new Error(json.message || response.statusText);
  return json.data;
}
function badge(status) {
  const text = status || '-';
  const cls = text === 'active' || text === 'ok' || text === 'online' ? 'green' : text.includes('pending') ? 'orange' : 'red';
  return `<span class="badge ${cls}">${h(text)}</span>`;
}
function money(cents) { return '¥' + ((Number(cents) || 0) / 100).toFixed(2); }
function bytes(n) { n = Number(n) || 0; return (n / 1024 / 1024 / 1024).toFixed(1) + ' GB'; }
function log(line) {
  const text = typeof line === 'string' ? line : JSON.stringify(line, null, 2);
  state.logLines.unshift(new Date().toLocaleTimeString() + '  ' + text);
  state.logLines = state.logLines.slice(0, 40);
  const box = $('logBox');
  if (box) box.textContent = state.logLines.join('\n');
}
function bindRoutes(root = document) {
  root.querySelectorAll('[data-route]').forEach(el => el.onclick = event => { event.preventDefault(); navigate(el.dataset.route); });
}
function renderLogin() {
  app.innerHTML = `<main class="login-page">
    <section class="login-hero">
      <div class="brand"><span class="logo"></span><span><strong>FRP Admin</strong><small>商业运营后台</small></span></div>
      <h1>登录后台后管理用户、套餐、隧道、节点和证书。</h1>
      <p>集中管理用户、套餐、兑换码、节点、证书和隧道运行状态，适合商业化运营和日常运维。</p>
    </section>
    <section class="login-card">
      <span class="eyebrow">Admin Login</span>
      <h2>管理员登录</h2>
      <div class="form">
        <label>管理员邮箱<input class="input" id="adminEmail" value="admin@example.com" autocomplete="username"></label>
        <label>管理员密码<input class="input" id="adminPassword" type="password" autocomplete="current-password"></label>
        <button class="btn primary full" id="adminLoginBtn">登录后台</button>
      </div>
      <div class="mini-log" id="loginLog">请输入管理员账号。</div>
    </section>
  </main>`;
  $('adminLoginBtn').onclick = async () => {
    try {
      const data = await api('/api/admin/login', { method: 'POST', body: JSON.stringify({ email: $('adminEmail').value, password: $('adminPassword').value }) });
      state.token = data.access_token;
      localStorage.setItem('adminToken', state.token);
      log('管理员登录成功');
      navigate('/dashboard');
    } catch (error) { $('loginLog').textContent = error.message; }
  };
}
async function loadAdminData() {
  const safe = async (fn, fallback) => { try { return await fn(); } catch (error) { log(error.message); return fallback; } };
  state.dashboard = await safe(() => api('/api/admin/dashboard'), {});
  state.plans = await safe(() => api('/api/admin/plans'), [] ) || [];
  state.tunnels = await safe(() => api('/api/admin/tunnels'), [] ) || [];
  state.users = await safe(() => api('/api/admin/users'), [] ) || [];
  state.nodes = await safe(() => api('/api/admin/nodes'), [] ) || [];
  state.settings = await safe(() => api('/api/admin/settings'), {} ) || {};
  state.certificates = await safe(() => api('/api/admin/certificates'), [] ) || [];
  state.operations = await safe(() => api('/api/admin/operation-logs'), [] ) || [];
}
async function renderAdmin(path) {
  app.innerHTML = shell(path, `<div class="card loading">加载后台数据...</div>`);
  bindShell();
  try {
    await loadAdminData();
    app.innerHTML = shell(path, page(path));
    bindShell();
    bindPage(path);
  } catch (error) {
    if (/认证|登录|Unauthorized|UNAUTHORIZED/i.test(error.message)) {
      state.token = '';
      localStorage.removeItem('adminToken');
      return navigate('/login');
    }
    app.innerHTML = shell(path, `<div class="card error"><h2>加载失败</h2><p>${h(error.message)}</p><button class="btn primary" id="retryBtn">重试</button></div>`);
    bindShell();
    $('retryBtn').onclick = render;
  }
}
function shell(path, body) {
  const active = adminRoutes.find(item => item.path === path) || adminRoutes[0];
  return `<div class="admin-shell ${state.sidebarCollapsed ? 'is-collapsed' : ''}">
    <aside class="side">
      <div class="side-head">
        <a class="brand" href="#/dashboard" data-route="/dashboard"><span class="logo"></span><span><strong>FRP Admin</strong><small>Operation Console</small></span></a>
        <button class="side-toggle" id="adminSidebarToggle" title="展开/收起侧栏" aria-label="展开/收起侧栏">${state.sidebarCollapsed ? '›' : '‹'}</button>
      </div>
      <nav class="nav">${adminRoutes.map(item => `<a class="${item.path === path ? 'active' : ''}" href="#${item.path}" data-route="${item.path}"><b>${item.label}</b><small>${item.desc}</small></a>`).join('')}</nav>
    </aside>
    <main class="main">
      <header class="top"><div><span class="eyebrow">Admin console</span><h1 class="title">${h(active.label)}</h1><p class="subtitle">${h(active.desc)}</p></div><div class="top-actions"><button class="btn secondary" id="refreshBtn">刷新</button><button class="btn danger" id="logoutBtn">退出</button></div></header>
      ${body}
    </main>
  </div>`;
}
function bindShell() {
  bindRoutes(app);
  const toggle = $('adminSidebarToggle'); if (toggle) toggle.onclick = toggleAdminSidebar;
  const refresh = $('refreshBtn'); if (refresh) refresh.onclick = render;
  const logout = $('logoutBtn'); if (logout) logout.onclick = () => { state.token = ''; localStorage.removeItem('adminToken'); navigate('/login'); };
}
function page(path) {
  if (path === '/users') return usersPage();
  if (path === '/plans') return plansPage();
  if (path === '/redeem') return redeemPage();
  if (path === '/tunnels') return tunnelsPage();
  if (path === '/nodes') return nodesPage();
  if (path === '/certificates') return certificatesPage();
  if (path === '/settings') return settingsPage();
  if (path === '/logs') return logsPage();
  return dashboardPage();
}
function dashboardPage() {
  const d = state.dashboard || {};
  return `<section class="metrics">
    <article class="metric-card"><span>在线客户端</span><strong>${h(d.online_clients || 0)}</strong><em class="badge green">healthy</em></article>
    <article class="metric-card"><span>活跃隧道</span><strong>${h(d.total_tunnels || 0)}</strong><em class="badge blue">tunnels</em></article>
    <article class="metric-card"><span>今日流量</span><strong>${bytes(d.today_traffic_bytes)}</strong><em class="badge orange">metered</em></article>
    <article class="metric-card"><span>套餐数量</span><strong>${state.plans.length}</strong><em class="badge green">plans</em></article>
  </section>
  <section class="split"><div class="card"><h2>最近用户</h2>${usersTable(state.users.slice(0, 6))}</div><div class="card"><h2>最近隧道</h2>${tunnelsTable(state.tunnels.slice(0, 6))}</div></section>`;
}
function usersPage() { return `<section class="card"><h2>用户管理</h2><p class="subtitle">查看用户账号和状态。</p>${usersTable(state.users)}</section>`; }
function usersTable(users) {
  if (!users.length) return '<div class="empty">暂无用户</div>';
  return `<div class="table-wrap"><table><thead><tr><th>ID</th><th>邮箱</th><th>状态</th><th>创建时间</th></tr></thead><tbody>${users.map(u => `<tr><td>${u.id}</td><td>${h(u.email)}</td><td>${badge(u.status)}</td><td>${h(u.created_at || '-')}</td></tr>`).join('')}</tbody></table></div>`;
}
function plansPage() {
  if (!state.plans.length) return '<section class="card"><h2>套餐管理</h2><div class="empty">暂无套餐</div></section>';
  return `<section class="card"><h2>套餐管理</h2><div class="table-wrap"><table><thead><tr><th>ID</th><th>套餐</th><th>价格</th><th>流量</th><th>限速</th><th>协议</th><th>状态</th></tr></thead><tbody>${state.plans.map(p => `<tr><td>${p.id}</td><td><b>${h(p.name)}</b><small>${h(p.description || '')}</small></td><td>${money(p.price_cents)}</td><td>${bytes(p.traffic_limit_bytes)}</td><td>${((p.bandwidth_limit_kbps || 0) / 1000).toFixed(2)} Mbps</td><td>${['tcp','udp','http','https'].filter(k => p['allow_' + k]).join('/')}</td><td>${badge(p.status)}</td></tr>`).join('')}</tbody></table></div></section>`;
}
function redeemPage() {
  return `<section class="split"><div class="card accent"><h2>生成兑换码</h2><div class="form"><input class="input" id="planId" value="1" placeholder="套餐 ID"><input class="input" id="codeCount" value="5" placeholder="数量"><input class="input" id="codePrefix" value="VIP" placeholder="前缀"><button class="btn primary" id="genCodeBtn">生成兑换码</button></div></div><div class="card"><h2>生成结果</h2><div class="log" id="logBox">${h(state.logLines.join('\n'))}</div></div></section>`;
}
function tunnelsPage() { return `<section class="card"><h2>隧道管理</h2>${tunnelsTable(state.tunnels)}</section>`; }
function tunnelsTable(tunnels) {
  if (!tunnels.length) return '<div class="empty">暂无隧道</div>';
  return `<div class="table-wrap"><table><thead><tr><th>用户ID</th><th>名称</th><th>协议</th><th>入口</th><th>本地</th><th>状态</th></tr></thead><tbody>${tunnels.map(t => `<tr><td>${t.user_id}</td><td>${h(t.name || '-')}</td><td>${h(t.type)}</td><td>${h(t.public_url || '')}</td><td>${h(t.local_host)}:${h(t.local_port)}</td><td>${badge(t.status)}</td></tr>`).join('')}</tbody></table></div>`;
}
function nodesPage() {
  return `<section class="grid-page"><div class="card accent"><h2>新增节点</h2><div class="form"><input class="input" id="nodeName" value="edge-node-1" placeholder="节点名称"><input class="input" id="nodeAgentUrl" placeholder="节点 Agent URL"><input class="input" id="nodeEntryDomain" placeholder="节点入口域名"><input class="input" id="nodeServerAddr" placeholder="frpc 连接地址"><input class="input" id="nodeFrpsPort" value="7000" placeholder="frps 端口"><div class="inline"><input class="input" id="nodeTcpStart" value="20000" placeholder="TCP 起始"><input class="input" id="nodeTcpEnd" value="29999" placeholder="TCP 结束"></div><div class="inline"><input class="input" id="nodeUdpStart" value="30000" placeholder="UDP 起始"><input class="input" id="nodeUdpEnd" value="39999" placeholder="UDP 结束"></div><button class="btn primary" id="createNodeBtn">新增节点并生成绑定 Token</button></div></div><div class="card"><h2>节点列表</h2>${nodesTable()}</div></section>`;
}
function nodesTable() {
  if (!state.nodes.length) return '<div class="empty">暂无节点</div>';
  return `<div class="table-wrap"><table><thead><tr><th>ID</th><th>节点</th><th>Agent</th><th>入口</th><th>状态</th><th>操作</th></tr></thead><tbody>${state.nodes.map(n => `<tr><td>${n.id}</td><td><b>${h(n.name)}</b><small>bind: ${h(n.bind_token || '-')}</small></td><td>${h(n.agent_url || '-')}</td><td>${h(n.frp_entry_domain || '-')}<small>${h(n.server_addr || '')}:${h(n.frp_server_port || 7000)}</small></td><td>${badge(n.status)}</td><td class="actions"><button class="btn secondary small" data-node="${n.id}" data-action="status">状态</button><button class="btn secondary small" data-node="${n.id}" data-action="frps-config">配置</button><button class="btn secondary small" data-node="${n.id}" data-action="frps-logs">日志</button><button class="btn secondary small" data-node="${n.id}" data-action="frps-restart" data-method="POST">重启</button></td></tr>`).join('')}</tbody></table></div>`;
}
function certificatesPage() {
  return `<section class="split"><div class="card accent"><h2>证书管理</h2><p class="subtitle">证书由用户端提交申请，后台负责全局查看、续期和网关配置管理。</p><div class="form"><input class="input" id="domainName" placeholder="用户域名，例如 app.user.com"><input class="input" id="cnameTarget" placeholder="CNAME 目标，例如 frp.example.com"><button class="btn secondary" id="checkCnameBtn">检测 CNAME</button><button class="btn secondary" id="renderNginxBtn">生成 HTTPS Nginx 配置</button><button class="btn secondary" id="renewDueBtn">续期到期证书</button><button class="btn secondary" id="forceRenewBtn">强制续期全部</button><button class="btn secondary" id="testNginxBtn">测试 Nginx</button><button class="btn secondary" id="reloadNginxBtn">Reload Nginx</button></div></div><div class="card"><h2>全部证书</h2>${certTable()}</div></section>`;
}
function certTable() {
  if (!state.certificates.length) return '<div class="empty">暂无证书</div>';
  return `<div class="table-wrap"><table><thead><tr><th>域名</th><th>状态</th><th>过期时间</th></tr></thead><tbody>${state.certificates.map(c => `<tr><td>${h(c.domain)}</td><td>${badge(c.status)}</td><td>${h(c.expires_at || '-')}</td></tr>`).join('')}</tbody></table></div>`;
}
function settingsPage() {
  const s = state.settings || {};
  return `<section class="split"><div class="card"><h2>系统设置</h2><div class="form"><input class="input" id="serverAddr" value="${h(s.server_addr || '')}" placeholder="FRP 入口域名"><input class="input" id="purchaseUrl" value="${h(s.purchase_url || '')}" placeholder="购买链接"><button class="btn primary" id="saveSettingsBtn">保存设置</button></div><h2>邮件测试</h2><div class="form"><input class="input" id="testMail" placeholder="测试收件邮箱"><button class="btn secondary" id="testMailBtn">发送测试邮件</button></div></div><div class="card accent"><h2>frps 管理</h2><div class="form"><button class="btn secondary" id="frpsStatusBtn">frps 状态</button><button class="btn secondary" id="frpsConfigBtn">查看 frps 配置</button><button class="btn secondary" id="frpsLogsBtn">查看 frps 日志</button><button class="btn secondary" id="frpsRestartBtn">Restart frps</button><button class="btn secondary" id="frpsReloadBtn">Reload frps</button></div></div></section>`;
}
function logsPage() {
  return `<section class="split"><div class="card"><h2>操作日志</h2>${opsTable()}</div><div class="card"><h2>运行日志</h2><div class="log" id="logBox">${h(state.logLines.join('\n'))}</div></div></section>`;
}
function opsTable() {
  if (!state.operations.length) return '<div class="empty">暂无操作日志</div>';
  return `<div class="table-wrap"><table><thead><tr><th>管理员</th><th>动作</th><th>目标</th><th>时间</th></tr></thead><tbody>${state.operations.map(o => `<tr><td>${h(o.admin_email)}</td><td>${h(o.action)}</td><td>${h(o.target)}</td><td>${h(o.created_at)}</td></tr>`).join('')}</tbody></table></div>`;
}
function bindPage(path) {
  if (path === '/redeem') {
    $('genCodeBtn').onclick = async () => { try { const data = await api('/api/admin/redeem-codes', { method: 'POST', body: JSON.stringify({ plan_id: Number($('planId').value), count: Number($('codeCount').value), prefix: $('codePrefix').value }) }); log(data); } catch (e) { log(e.message); } };
  }
  if (path === '/nodes') {
    $('createNodeBtn').onclick = async () => { try { const node = await api('/api/admin/nodes', { method: 'POST', body: JSON.stringify({ name: $('nodeName').value, agent_url: $('nodeAgentUrl').value, frp_entry_domain: $('nodeEntryDomain').value, server_addr: $('nodeServerAddr').value, frp_server_port: Number($('nodeFrpsPort').value), tcp_port_start: Number($('nodeTcpStart').value), tcp_port_end: Number($('nodeTcpEnd').value), udp_port_start: Number($('nodeUdpStart').value), udp_port_end: Number($('nodeUdpEnd').value) }) }); log('节点已创建，NODE_BIND_TOKEN：' + node.bind_token); render(); } catch (e) { log(e.message); } };
    document.querySelectorAll('[data-node]').forEach(btn => btn.onclick = async () => { try { log(await api(`/api/admin/nodes/${btn.dataset.node}/${btn.dataset.action}`, { method: btn.dataset.method || 'GET' })); } catch (e) { log(e.message); } });
  }
  if (path === '/certificates') {
    const domainBody = () => ({ domain: $('domainName').value, target: $('cnameTarget').value });
    $('checkCnameBtn').onclick = async () => { try { log(await api('/api/admin/domains/check-cname', { method: 'POST', body: JSON.stringify(domainBody()) })); } catch (e) { log(e.message); } };
    $('renderNginxBtn').onclick = async () => { try { log(await api('/api/admin/nginx/render-https', { method: 'POST', body: JSON.stringify(domainBody()) })); } catch (e) { log(e.message); } };
    $('renewDueBtn').onclick = async () => { try { log(await api('/api/admin/certificates/renew-due', { method: 'POST', body: JSON.stringify({ force: false }) })); render(); } catch (e) { log(e.message); } };
    $('forceRenewBtn').onclick = async () => { try { log(await api('/api/admin/certificates/renew-due', { method: 'POST', body: JSON.stringify({ force: true }) })); render(); } catch (e) { log(e.message); } };
    $('testNginxBtn').onclick = async () => { try { log(await api('/api/admin/nginx/test', { method: 'POST' })); } catch (e) { log(e.message); } };
    $('reloadNginxBtn').onclick = async () => { try { log(await api('/api/admin/nginx/reload', { method: 'POST' })); } catch (e) { log(e.message); } };
  }
  if (path === '/settings') {
    $('saveSettingsBtn').onclick = async () => { try { const current = state.settings || {}; current.server_addr = $('serverAddr').value; current.frp_entry_domain = $('serverAddr').value; current.purchase_url = $('purchaseUrl').value; log(await api('/api/admin/settings', { method: 'PUT', body: JSON.stringify(current) })); render(); } catch (e) { log(e.message); } };
    $('testMailBtn').onclick = async () => { try { log(await api('/api/admin/settings/test-mail', { method: 'POST', body: JSON.stringify({ email: $('testMail').value }) })); } catch (e) { log(e.message); } };
    $('frpsStatusBtn').onclick = async () => { try { log(await api('/api/admin/frps/status')); } catch (e) { log(e.message); } };
    $('frpsConfigBtn').onclick = async () => { try { log(await api('/api/admin/frps/config')); } catch (e) { log(e.message); } };
    $('frpsLogsBtn').onclick = async () => { try { log(await api('/api/admin/frps/logs')); } catch (e) { log(e.message); } };
    $('frpsRestartBtn').onclick = async () => { try { log(await api('/api/admin/frps/restart', { method: 'POST' })); } catch (e) { log(e.message); } };
    $('frpsReloadBtn').onclick = async () => { try { log(await api('/api/admin/frps/reload', { method: 'POST' })); } catch (e) { log(e.message); } };
  }
}
async function render() {
  const next = normalizeRoute(route());
  if (next !== route()) return navigate(next);
  if (next === '/login') return renderLogin();
  return renderAdmin(next);
}
window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
