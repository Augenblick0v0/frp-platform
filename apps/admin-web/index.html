<!doctype html>
<html lang="zh-CN">

<body>
<div id="adminApp"></div>
<script>
const $ = id => document.getElementById(id);
const app = $('adminApp');
const state = {

  sidebarCollapsed: localStorage.getItem('adminSidebarCollapsedV2') !== 'false',
  dashboard: null,
  users: [],
  plans: [],
  redeemCodes: [],
  tunnels: [],
  nodes: [],
  certificates: [],
  operations: [],
  settings: null,
  paymentConfig: null,
  node生成结果: '请选择节点操作。',
  editingPlanId: null,
  editingUserId: null,
  logLines: ['ready'],
};
const adminRoutes = [
  { path: '/dashboard', label: '仪表盘', desc: '平台核心指标' },
  { path: '/users', label: '用户管理', desc: '账号与状态' },
  { path: '/plans', label: '套餐管理', desc: '售卖套餐' },
  { path: '/redeem', label: '兑换码', desc: '批量生成' },
  { path: '/tunnels', label: '隧道管理', desc: '全部映射' },
  { path: '/nodes', label: '节点管理', desc: '边缘节点' },
  { path: '/certificates', label: '域名证书', desc: 'HTTPS 运维' },
  { path: '/settings', label: '系统设置', desc: '服务参数' },
  { path: '/logs', label: '操作日志', desc: '审计记录' },
];
function h(value) { return String(value ?? '').replace(/[&<>'"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch])); }
function collapsedLabel(label) {
  const chars = Array.from(String(label || ''));
  if (chars.length <= 2) return h(label);
  if (chars.length === 4) return `${h(chars.slice(0, 2).join(''))}<br>${h(chars.slice(2).join(''))}`;
  return chars.map(ch => h(ch)).join('<br>');
}
function route() { return location.hash.replace(/^#/, '') || '/'; }
function navigate(path) { if (route() === path) render(); else location.hash = path; }
function normalizeRoute(path) {
  if (!path || path === '/') return state.token ? '/dashboard' : '/login';
  if (path !== '/login' && !state.token) return '/login';
  if (path === '/login' && state.token) return '/dashboard';
  return adminRoutes.some(item => item.path === path) || path === '/login' ? path : '/dashboard';
}
function apiOrigin() {
  state.apiBase = location.origin;
  return state.apiBase.replace(/\/$/, '');
}
function toggleAdminSidebar() {
  state.sidebarCollapsed = !state.sidebarCollapsed;
  localStorage.setItem('adminSidebarCollapsedV2', String(state.sidebarCollapsed));
  render();
}
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (state.token) headers.Authorization = 'Bearer ' + state.token;
  const response = await fetch(apiOrigin() + path, { ...opts, headers });
  const json = await response.json().catch(() => ({ success: false, message: response.statusText }));
  if (!response.ok || json.success === false) throw new Error(json.message || response.statusText);
  return json.data;
}
function badge(status) {
  const text = status || '-';
  const cls = text === 'active' || text === 'ok' || text === 'online' ? 'green' : text.includes('pending') ? 'orange' : 'red';
  return `<span class="badge ${cls}">${h(text)}</span>`;
}
function money(cents) { return '¥' + ((Number(cents) || 0) / 100).toFixed(2); }
function bytes(n) { n = Number(n) || 0; return (n / 1024 / 1024 / 1024).toFixed(1) + ' GB'; }
function planName(id) { const p = state.plans.find(item => Number(item.id) === Number(id)); return p ? p.name : ('套餐 #' + id); }
function planPayloadFromForm() {
  const gb = Number($('planTrafficGb').value) || 0;
  const mbps = Number($('planBandwidthMbps').value) || 0;
  return { name: $('planName').value.trim(), description: $('planDesc').value.trim(), price_cents: Math.round((Number($('planPrice').value) || 0) * 100), duration_days: Number($('planDuration').value) || 30, traffic_limit_bytes: Math.round(gb * 1024 * 1024 * 1024), bandwidth_limit_kbps: Math.round(mbps * 1000), max_tunnels: Number($('planMaxTunnels').value) || 0, max_tcp_tunnels: Number($('planMaxTcp').value) || 0, max_udp_tunnels: Number($('planMaxUdp').value) || 0, max_http_tunnels: Number($('planMaxHttp').value) || 0, max_https_tunnels: Number($('planMaxHttps').value) || 0, allow_tcp: $('planAllowTcp').checked, allow_udp: $('planAllowUdp').checked, allow_http: $('planAllowHttp').checked, allow_https: $('planAllowHttps').checked, allow_custom_domain: $('planAllowDomain').checked, max_domains: Number($('planMaxDomains').value) || 0, allow_auto_cert: $('planAllowCert').checked, status: $('plan状态').value };
}
function setPlanForm(plan = null) {
  state.editingPlanId = plan ? plan.id : null;

  const checked = (id, v) => { const el = $(id); if (el) el.checked = !!v; };

  value('planDesc', plan?.description || '');
  value('planPrice', ((Number(plan?.price_cents) || 0) / 100).toFixed(2));
  value('planDuration', plan?.duration_days || 30);
  value('planTrafficGb', ((Number(plan?.traffic_limit_bytes) || 0) / 1024 / 1024 / 1024).toFixed(0));
  value('planBandwidthMbps', ((Number(plan?.bandwidth_limit_kbps) || 0) / 1000).toFixed(2));
  value('planMaxTunnels', plan?.max_tunnels || 20);
  value('planMaxTcp', plan?.max_tcp_tunnels || 10);
  value('planMaxUdp', plan?.max_udp_tunnels || 10);
  value('planMaxHttp', plan?.max_http_tunnels || 10);
  value('planMaxHttps', plan?.max_https_tunnels || 10);
  value('planMaxDomains', plan?.max_domains || 10);
  value('plan状态', plan?.status || 'active');
  checked('planAllowTcp', plan ? plan.allow_tcp : true); checked('planAllowUdp', plan ? plan.allow_udp : true); checked('planAllowHttp', plan ? plan.allow_http : true); checked('planAllowHttps', plan ? plan.allow_https : true); checked('planAllowDomain', plan ? plan.allow_custom_domain : true); checked('planAllowCert', plan ? plan.allow_auto_cert : true);
  const title = $('planFormTitle'); if (title) title.textContent = plan ? `编辑套餐 #${plan.id}` : '新增套餐';
  const btn = $('savePlanBtn'); if (btn) btn.textContent = plan ? '保存套餐' : '新增套餐';
}
function log(line) {
  const text = typeof line === 'string' ? line : JSON.stringify(line, null, 2);
  state.logLines.unshift(new Date().toLocaleTimeString() + '  ' + text);
  state.logLines = state.logLines.slice(0, 40);

  if (box) box.textContent = state.logLines.join('\n');
}

}

      <h1>登录后台后管理用户、套餐、隧道、节点和证书。</h1>
      <p>集中管理用户、套餐、兑换码、节点、证书和隧道运行状态，适合商业化运营和日常运维。</p>
    </section>
    <section class="login-card">
      <span class="eyebrow">Admin Login</span>
      <h2>管理员登录</h2>

        <label class="field"><span>管理员密码</span><input class="input" id="adminPassword" type="password" autocomplete="current-password"></label>
        <button class="btn primary full" id="adminLoginBtn">登录后台</button>

      <div class="mini-log" id="loginLog">请输入管理员账号。</div>

  $('adminLoginBtn').onclick = async () => {
    try {
      const data = await api('/api/admin/login', { method: 'POST', body: JSON.stringify({ email: $('adminEmail').value, password: $('adminPassword').value }) });

      localStorage.setItem('adminToken', state.token);

}
async function loadAdminData() {
  const safe = async (fn, fallback) => { try { return await fn(); } catch (error) { log(error.message); return fallback; } };

  state.plans = await safe(() => api('/api/admin/plans'), [] ) || [];
  state.redeemCodes = await safe(() => api('/api/admin/redeem-codes'), [] ) || [];
  state.tunnels = await safe(() => api('/api/admin/tunnels'), [] ) || [];
  state.users = await safe(() => api('/api/admin/users'), [] ) || [];
  state.nodes = await safe(() => api('/api/admin/nodes'), [] ) || [];
  state.settings = await safe(() => api('/api/admin/settings'), {} ) || {};
  state.paymentConfig = await safe(() => api('/api/admin/payment-config'), null);
  state.certificates = await safe(() => api('/api/admin/certificates'), [] ) || [];
  state.operations = await safe(() => api('/api/admin/operation-logs'), [] ) || [];
}
async function renderAdmin(path) {

    bindShell();
    bindPage(path);
  } catch (error) {
    if (/认证|登录|Unauthorized|UNAUTHORIZED/i.test(error.message)) {
      state.token = '';
      localStorage.removeItem('adminToken');
      return navigate('/login');
    }
    app.innerHTML = shell(path, `<div class="card error"><h2>加载失败</h2><p>${h(error.message)}</p><button class="btn primary" id="retryBtn">重试</button></div>`);

  }
}
function shell(path, body) {

}
function bindShell() {

function page(path) {

}

  return `<section class="grid-page"><div class="card accent"><h2 id="planFormTitle">${editing ? '编辑套餐 #' + editing.id : '新增套餐'}</h2><p class="subtitle">新增或修改售卖套餐。已开通的历史订阅不会被回写修改。</p><div class="form"><label class="field"><span>套餐名称</span><input class="input" id="planName" placeholder="专业套餐"></label><label class="field"><span>套餐说明</span><input class="input" id="planDesc" placeholder="展示给用户看的权益说明"></label><div class="inline"><label class="field"><span>价格（元）</span><input class="input" id="planPrice" type="number" step="0.01" min="0" value="9.90"></label><label class="field"><span>有效天数</span><input class="input" id="planDuration" type="number" min="1" value="30"></label></div><div class="inline"><label class="field"><span>流量（GB）</span><input class="input" id="planTrafficGb" type="number" min="0" value="100"></label><label class="field"><span>限速（Mbps）</span><input class="input" id="planBandwidthMbps" type="number" min="0" step="0.01" value="10"></label></div><div class="inline"><label class="field"><span>最大隧道数</span><input class="input" id="planMaxTunnels" type="number" min="0" value="20"></label><label class="field"><span>最大域名数</span><input class="input" id="planMaxDomains" type="number" min="0" value="10"></label></div><div class="inline"><label class="field"><span>TCP 数量</span><input class="input" id="planMaxTcp" type="number" min="0" value="10"></label><label class="field"><span>UDP 数量</span><input class="input" id="planMaxUdp" type="number" min="0" value="10"></label></div><div class="inline"><label class="field"><span>HTTP 数量</span><input class="input" id="planMaxHttp" type="number" min="0" value="10"></label><label class="field"><span>HTTPS 数量</span><input class="input" id="planMaxHttps" type="number" min="0" value="10"></label></div><div class="check-grid"><label><input id="planAllowTcp" type="checkbox" checked> TCP</label><label><input id="planAllowUdp" type="checkbox" checked> UDP</label><label><input id="planAllowHttp" type="checkbox" checked> HTTP</label><label><input id="planAllowHttps" type="checkbox" checked> HTTPS</label><label><input id="planAllowDomain" type="checkbox" checked> 自定义域名</label><label><input id="planAllowCert" type="checkbox" checked> 自动证书</label></div><label class="field"><span>状态</span><select class="input" id="planStatus"><option value="active">active</option><option value="disabled">disabled</option></select></label><div class="inline"><button class="btn primary" id="savePlanBtn">新增套餐</button><button class="btn secondary" id="resetPlanBtn" type="button">清空</button></div></div></div><div class="card"><h2>套餐列表</h2>${plansTable()}</div></section>`;
}

function nodesTable() {
  if (!state.nodes.length) return '<div class="empty">暂无节点</div>';
  return `<div class="table-wrap"><table><thead><tr><th>ID</th><th>节点</th><th>Agent</th><th>入口</th><th>状态</th><th>操作</th></tr></thead><tbody>${state.nodes.map(n => `<tr><td>${n.id}</td><td><b>${h(n.name)}</b><small>bind: ${h(n.bind_token || '-')}</small></td><td>${h(n.agent_url || '-')}</td><td>${h(n.frp_entry_domain || '-')}<small>${h(n.server_addr || '')}:${h(n.frp_server_port || 7000)}</small></td><td>${badge(n.status)}</td><td class="actions"><button class="btn secondary small" data-node="${n.id}" data-action="status">状态</button><button class="btn secondary small" data-node="${n.id}" data-action="frps-config">配置</button><button class="btn secondary small" data-node="${n.id}" data-action="frps-logs">日志</button><button class="btn secondary small" data-node="${n.id}" data-action="frps-restart" data-method="POST">重启</button><button class="btn danger small" data-node-delete="${n.id}" data-node-name="${h(n.name)}">删除</button></td></tr>`).join('')}</tbody></table></div>`;
}
function certificatesPage() {
  return `<section class="split"><div class="card accent"><h2>证书管理</h2><p class="subtitle">证书由用户端提交申请，后台负责全局查看、续期和网关配置管理。</p><div class="form"><label class="field"><span>用户域名</span><input class="input" id="domainName" placeholder="例如 app.user.com"></label><label class="field"><span>CNAME 目标</span><input class="input" id="cnameTarget" placeholder="例如 frp.example.com"></label><button class="btn secondary" id="checkCnameBtn">检测 CNAME</button><button class="btn secondary" id="renderNginxBtn">生成 HTTPS Nginx 配置</button><button class="btn secondary" id="renewDueBtn">续期到期证书</button><button class="btn secondary" id="forceRenewBtn">强制续期全部</button><button class="btn secondary" id="testNginxBtn">测试 Nginx</button><button class="btn secondary" id="reloadNginxBtn">Reload Nginx</button></div></div><div class="card"><h2>全部证书</h2>${certTable()}</div></section>`;
}
function certTable() {
  if (!state.certificates.length) return '<div class="empty">暂无证书</div>';
  return `<div class="table-wrap"><table><thead><tr><th>域名</th><th>状态</th><th>过期时间</th></tr></thead><tbody>${state.certificates.map(c => `<tr><td>${h(c.domain)}</td><td>${badge(c.status)}</td><td>${h(c.expires_at || '-')}</td></tr>`).join('')}</tbody></table></div>`;
}
function settingsPage() {
  const s = state.settings || {};
  const pay = state.paymentConfig || {};
  return `<section class="split"><div class="card"><h2>系统设置</h2><div class="form"><label class="field"><span>FRP 入口域名</span><input class="input" id="serverAddr" value="${h(s.server_addr || '')}" placeholder="frp.example.com"></label><label class="field"><span>购买链接</span><input class="input" id="purchaseUrl" value="${h(s.purchase_url || '')}" placeholder="套餐购买页或客服链接"></label><button class="btn primary" id="saveSettingsBtn">保存设置</button></div><h2>支付方式绑定</h2><div class="info-list payment-config"><dt>支付方式</dt><dd>epay</dd><dt>状态</dt><dd>${badge(pay.enabled ? 'online' : 'disabled')}</dd><dt>商户 ID</dt><dd>${pay.pid_set ? '已配置' : '未配置'}</dd><dt>商户密钥</dt><dd>${pay.key_set ? '已配置' : '未配置'}</dd><dt>提交地址</dt><dd>${h(pay.submit_url || '-')}</dd><dt>回调地址</dt><dd>${h(pay.public_url || '-')}</dd></div><p class="muted">Payment secrets are read from environment variables. Update 商户 ID/商户密钥 in deploy env and restart API if they need to change.</p><h2>邮件测试</h2><div class="form"><label class="field"><span>测试收件邮箱</span><input class="input" id="testMail" placeholder="admin@example.com"></label><button class="btn secondary" id="testMailBtn">发送测试邮件</button></div></div><div class="card accent"><h2>frps 管理</h2><div class="form"><button class="btn secondary" id="frps状态Btn">frps 状态</button><button class="btn secondary" id="frpsConfigBtn">查看 frps 配置</button><button class="btn secondary" id="frpsLogsBtn">查看 frps 日志</button><button class="btn secondary" id="frpsRestartBtn">Restart frps</button><button class="btn secondary" id="frpsReloadBtn">Reload frps</button></div></div></section>`;
}
function logsPage() {
  return `<section class="split"><div class="card"><h2>操作日志</h2>${opsTable()}</div><div class="card"><h2>运行日志</h2><div class="log" id="logBox">${h(state.logLines.join('\n'))}</div></div></section>`;
}
function opsTable() {
  if (!state.operations.length) return '<div class="empty">暂无操作日志</div>';
  return `<div class="table-wrap"><table><thead><tr><th>管理员</th><th>动作</th><th>目标</th><th>时间</th></tr></thead><tbody>${state.operations.map(o => `<tr><td>${h(o.admin_email)}</td><td>${h(o.action)}</td><td>${h(o.target)}</td><td>${h(o.created_at)}</td></tr>`).join('')}</tbody></table></div>`;
}
function bindPage(path) {
  if (path === '/users') {
    const editing = state.users.find(u => Number(u.id) === Number(state.editingUserId));
    if (editing) $('editUserStatus').value = editing.status || 'active';
    document.querySelectorAll('[data-edit-user]').forEach(btn => btn.onclick = () => { state.editingUserId = Number(btn.dataset.editUser); render(); });
    const save = $('saveUserBtn');
    if (save) save.onclick = async () => {
      try {
        const data = await api('/api/admin/users/' + state.editingUserId, { method: 'PUT', body: JSON.stringify({ status: $('editUserStatus').value, plan_id: Number($('editUserPlan').value) }) });
        $('userEditLog').textContent = '保存成功：' + JSON.stringify(data);
        state.editingUserId = null;
        render();
      } catch (e) { $('userEditLog').textContent = e.message; }
    };
  }
  if (path === '/plans') {
    setPlanForm(state.plans.find(p => Number(p.id) === Number(state.editingPlanId)) || null);
    document.querySelectorAll('[data-edit-plan]').forEach(btn => btn.onclick = () => { state.editingPlanId = Number(btn.dataset.editPlan); render(); });
    $('resetPlanBtn').onclick = () => { state.editingPlanId = null; setPlanForm(null); };
    $('savePlanBtn').onclick = async () => {
      try {
        const payload = planPayloadFromForm();
        if (!payload.name) throw new Error('套餐名称不能为空');
        const id = state.editingPlanId;
        const saved = await api(id ? `/api/admin/plans/${id}` : '/api/admin/plans', { method: id ? 'PUT' : 'POST', body: JSON.stringify(payload) });
        log((id ? '套餐已更新：' : '套餐已创建：') + saved.name);
        state.editingPlanId = null;
        render();
      } catch (e) { log(e.message); }
    };
  }
  if (path === '/redeem') {
    $('genCodeBtn').onclick = async () => {
      try {
        const data = await api('/api/admin/redeem-codes', { method: 'POST', body: JSON.stringify({ plan_id: Number($('planId').value), count: Number($('code生成数量').value), prefix: $('code兑换码前缀').value }) });
        const codes = Array.isArray(data) ? data.map(c => c.code).join('\\n') : JSON.stringify(data, null, 2);
        log('生成成功，绑定套餐：' + planName($('planId').value) + '\\n' + codes);
        render();
      } catch (e) { log('创建失败：' + e.message); }
    };
  }
  if (path === '/nodes') {
    const setNode生成结果 = text => { state.node生成结果 = text; const box = $('node生成结果Box'); if (box) box.textContent = text; };
    $('createNodeBtn').onclick = async () => { try { const node = await api('/api/admin/nodes', { method: 'POST', body: JSON.stringify({ name: $('nodeName').value, agent_url: $('nodeAgentUrl').value, frp_entry_domain: $('nodeEntryDomain').value, server_addr: $('nodeServerAddr').value, frp_server_port: Number($('nodeFrpsPort').value), tcp_port_start: Number($('nodeTcpStart').value), tcp_port_end: Number($('nodeTcpEnd').value), udp_port_start: Number($('nodeUdpStart').value), udp_port_end: Number($('nodeUdpEnd').value) }) }); setNode生成结果('节点已创建，NODE_BIND_TOKEN：' + node.bind_token); render(); } catch (e) { setNode生成结果('创建失败：' + e.message); } };
    document.querySelectorAll('[data-node]').forEach(btn => btn.onclick = async () => {
      const label = btn.textContent.trim();
      try {
        btn.disabled = true;
        setNode生成结果(`正在执行节点 #${btn.dataset.node} ${label}...`);
        const data = await api(`/api/admin/nodes/${btn.dataset.node}/${btn.dataset.action}`, { method: btn.dataset.method || 'GET' });
        setNode生成结果(`Node #${btn.dataset.node} ${label} 成功：\n` + JSON.stringify(data, null, 2));
      } catch (e) {
        setNode生成结果(`Node #${btn.dataset.node} ${label} 失败：\n` + e.message);
      } finally {
        btn.disabled = false;
      }
    });
    document.querySelectorAll('[data-node-delete]').forEach(btn => btn.onclick = async () => {
      const name = btn.dataset.nodeName || ('#' + btn.dataset.nodeDelete);
      if (!confirm('确认删除节点 ' + name + '?')) return;
      try { setNode生成结果('正在删除节点 ' + name + '...'); const data = await api(`/api/admin/nodes/${btn.dataset.nodeDelete}/delete`, { method: 'DELETE' }); setNode生成结果('Delete 成功：\n' + JSON.stringify(data, null, 2)); render(); } catch (e) { setNode生成结果('删除失败：' + e.message); }
    });
  }
  if (path === '/certificates') {
    const domainBody = () => ({ domain: $('domainName').value, target: $('cnameTarget').value });
    $('checkCnameBtn').onclick = async () => { try { log(await api('/api/admin/domains/check-cname', { method: 'POST', body: JSON.stringify(domainBody()) })); } catch (e) { log(e.message); } };
    $('renderNginxBtn').onclick = async () => { try { log(await api('/api/admin/nginx/render-https', { method: 'POST', body: JSON.stringify(domainBody()) })); } catch (e) { log(e.message); } };
    $('renewDueBtn').onclick = async () => { try { log(await api('/api/admin/certificates/renew-due', { method: 'POST', body: JSON.stringify({ force: false }) })); render(); } catch (e) { log(e.message); } };
    $('forceRenewBtn').onclick = async () => { try { log(await api('/api/admin/certificates/renew-due', { method: 'POST', body: JSON.stringify({ force: true }) })); render(); } catch (e) { log(e.message); } };
    $('testNginxBtn').onclick = async () => { try { log(await api('/api/admin/nginx/test', { method: 'POST' })); } catch (e) { log(e.message); } };
    $('reloadNginxBtn').onclick = async () => { try { log(await api('/api/admin/nginx/reload', { method: 'POST' })); } catch (e) { log(e.message); } };
  }
  if (path === '/settings') {
    $('saveSettingsBtn').onclick = async () => { try { const current = state.settings || {}; current.server_addr = $('serverAddr').value; current.frp_entry_domain = $('serverAddr').value; current.purchase_url = $('purchaseUrl').value; log(await api('/api/admin/settings', { method: 'PUT', body: JSON.stringify(current) })); render(); } catch (e) { log(e.message); } };
    $('testMailBtn').onclick = async () => { try { log(await api('/api/admin/settings/test-mail', { method: 'POST', body: JSON.stringify({ email: $('testMail').value }) })); } catch (e) { log(e.message); } };
    $('frps状态Btn').onclick = async () => { try { log(await api('/api/admin/frps/status')); } catch (e) { log(e.message); } };
    $('frpsConfigBtn').onclick = async () => { try { log(await api('/api/admin/frps/config')); } catch (e) { log(e.message); } };
    $('frpsLogsBtn').onclick = async () => { try { log(await api('/api/admin/frps/logs')); } catch (e) { log(e.message); } };
    $('frpsRestartBtn').onclick = async () => { try { log(await api('/api/admin/frps/restart', { method: 'POST' })); } catch (e) { log(e.message); } };
    $('frpsReloadBtn').onclick = async () => { try { log(await api('/api/admin/frps/reload', { method: 'POST' })); } catch (e) { log(e.message); } };
  }
}
async function render() {
  const next = normalizeRoute(route());
  if (next !== route()) return navigate(next);
  if (next === '/login') return renderLogin();
  return renderAdmin(next);
}
window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
