<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FRP Tunnel Platform</title>
  <link rel="stylesheet" href="style.css?v=side-left-20260707-2">
</head>
<body>
<div id="app"></div>
<script>
const $ = id => document.getElementById(id);
const app = $('app');
const state = {
  token: localStorage.getItem('token') || '',
  apiBase: location.origin,
  sidebarCollapsed: localStorage.getItem('userSidebarCollapsedV2') !== 'false',
  me: null,
  subscription: null,
  traffic: null,
  tunnels: [],
  plans: [],
  activeSubscription: false,
  logLines: ['ready'],
  loading: false,
};

const navItems = [
  ['/app/overview', '概览', '总览资源与状态'],
  ['/app/billing', '套餐与支付', '购买、兑换和续费'],
  ['/app/tunnels', '隧道管理', '创建与查看映射'],
  ['/app/traffic', '流量与日志', '用量上报与操作记录'],
  ['/app/certificates', '域名证书', '申请 HTTPS 证书'],
  ['/app/settings', '账户设置', '账号与安全'],
];

function h(value) {
  return String(value ?? '').replace(/[&<>'"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch]));
}
function currentRoute() { return location.hash.replace(/^#/, '') || '/'; }
function navigate(route) { if (currentRoute() === route) render(); else location.hash = route; }
function normalizeRoute(route) {
  if (!route || route === '/') return '/';
  if (route.startsWith('/app') && !state.token) return '/login';
  if ((route === '/login' || route === '/register') && state.token) return '/app/overview';
  if (route === '/app') return '/app/overview';
  if (route.startsWith('/app') && !navItems.some(([r]) => r === route)) return '/app/overview';
  return route;
}
function apiOrigin() {
  state.apiBase = location.origin;
  return state.apiBase.replace(/\/$/, '');
}
function toggleUserSidebar() {
  state.sidebarCollapsed = !state.sidebarCollapsed;
  localStorage.setItem('userSidebarCollapsedV2', String(state.sidebarCollapsed));
  render();
}
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (state.token) headers.Authorization = 'Bearer ' + state.token;
  const response = await fetch(apiOrigin() + path, { ...opts, headers });
  const json = await response.json().catch(() => ({ success: false, message: response.statusText }));
  if (!response.ok || json.success === false) throw new Error(json.message || response.statusText);
  return json.data;
}
function pushLog(line) {
  const text = typeof line === 'string' ? line : JSON.stringify(line, null, 2);
  state.logLines.unshift(new Date().toLocaleTimeString() + '  ' + text);
  state.logLines = state.logLines.slice(0, 30);
  const box = $('logBox');
  if (box) box.textContent = state.logLines.join('\n');
}
function fmtBytes(n) {
  n = Number(n) || 0;
  if (n <= 0) return '-';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  let i = 0;
  while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
  return (i === 0 ? n.toFixed(0) : n.toFixed(1)) + ' ' + units[i];
}
function fmtMoney(cents) { return '¥' + ((Number(cents) || 0) / 100).toFixed(2); }
function fmtMbpsFromKbps(v) { return (!v || v < 0) ? '-' : (v / 1000).toFixed(2) + ' Mbps'; }
function fmtMBpsFromKbps(v) { return (!v || v < 0) ? '-' : (v / 8000).toFixed(2) + ' MB/s'; }
function mbpsToKbps(v) { return (!v || v < 0) ? 0 : Math.round(v * 1000); }
function fmtLimit(t) {
  const effective = t.effective_bandwidth_limit_kbps || t.bandwidth_limit_kbps || 0;
  return effective ? `${fmtMbpsFromKbps(effective)} / ${fmtMBpsFromKbps(effective)}` : '继承套餐';
}
function shellHeader(kind = 'public') {
  return `<header class="site-header ${kind === 'auth' ? 'auth-header' : ''}">
    <a class="brand" href="#/" data-route="/" aria-label="返回首页"><span class="logo-mark"></span><span><strong>FRP Tunnel</strong><small>Nas & Game Access</small></span></a>
    <nav class="site-nav" aria-label="主导航">
      <a href="#/" data-route="/">首页</a>
      <a href="#/login" data-route="/login">登录</a>
      <a class="nav-pill" href="#/register" data-route="/register">注册</a>
    </nav>
  </header>`;
}
function footer() {
  return `<footer class="site-footer"><span>FRP Tunnel Platform</span><span>独立用户端 · 后台端分离部署</span></footer>`;
}
function bindRouteLinks(root = document) {
  root.querySelectorAll('[data-route]').forEach(el => {
    el.addEventListener('click', event => {
      event.preventDefault();
      navigate(el.dataset.route);
    });
  });
}

function renderLanding() {
  app.innerHTML = `<div class="public-page">
    ${shellHeader('public')}
    <main class="landing-main">
      <section class="hero-panel">
        <div class="hero-copy">
          <span class="eyebrow">Private network access</span>
          <h1>让飞牛 NAS 和本地服务，像云服务一样可访问。</h1>
          <p>为飞牛 NAS、远程办公、游戏联机和开发联调提供稳定公网入口，支持套餐购买、域名映射、流量统计和多协议隧道。</p>
          <div class="hero-actions">
            <a class="btn primary" href="#/login" data-route="/login">登录控制台</a>
            <a class="btn secondary" href="#/register" data-route="/register">注册账号</a>
          </div>
        </div>
        <div class="hero-console-card" aria-label="产品能力预览">
          <div class="window-dots"><i></i><i></i><i></i></div>
          <div class="preview-row"><span>HTTP / HTTPS</span><strong>域名映射</strong></div>
          <div class="preview-row"><span>TCP / UDP</span><strong>游戏与远程桌面</strong></div>
          <div class="preview-row"><span>Billing</span><strong>易支付套餐开通</strong></div>
          <div class="preview-meter"><b style="width:72%"></b></div>
        </div>
      </section>
      <section class="scene-grid" id="scenes">
        <article><b>NAS 外网访问</b><span>飞牛、群晖、WebDAV、相册服务</span></article>
        <article><b>开发联调</b><span>Webhook、本地 Demo、测试环境</span></article>
        <article><b>游戏联机</b><span>Minecraft、Steam 服务器、UDP 服务</span></article>
        <article><b>远程运维</b><span>SSH、RDP、Home Assistant 面板</span></article>
      </section>
      <section class="trust-band">
        <div>
          <span class="eyebrow">Commercial Frp Service</span>
          <h2>稳定、可控、适合长期使用的内网穿透服务。</h2>
          <p>面向 NAS 外网访问、远程办公、游戏联机和开发联调，提供套餐化计费、流量统计、HTTPS 域名接入和可视化隧道管理。</p>
        </div>
        <a class="btn primary" href="#/register" data-route="/register">立即开通账号</a>
      </section>
      <section class="commercial-grid">
        <article class="commercial-card price-feature">
          <span class="eyebrow">Starter Plan</span>
          <h3>高级套餐</h3>
          <strong>¥9.90 <small>/ 30 天</small></strong>
          <p>100GB 流量、10.24Mbps 限速，支持 TCP / UDP / HTTP / HTTPS 和自定义域名。</p>
          <a class="btn secondary" href="#/login" data-route="/login">登录后购买</a>
        </article>
        <article class="commercial-card"><b>透明用量</b><span>控制台查看剩余流量、今日用量和隧道状态，避免黑盒消耗。</span></article>
        <article class="commercial-card"><b>域名与证书</b><span>支持 HTTP/HTTPS 域名映射，可配合自动证书能力完成正式访问。</span></article>
        <article class="commercial-card"><b>多协议接入</b><span>Web 面板、SSH、RDP、游戏端口和 UDP 服务可以按场景创建隧道。</span></article>
      </section>
    </main>
    ${footer()}
  </div>`;
  bindRouteLinks(app);
}

function renderAuth(mode) {
  const isRegister = mode === 'register';
  app.innerHTML = `<div class="auth-page">
    ${shellHeader('auth')}
    <main class="auth-main">
      <section class="auth-visual">
        <span class="eyebrow">${isRegister ? 'Create account' : 'Password login'}</span>
        <h1>${isRegister ? '注册后再创建隧道。' : '登录后进入用户控制台。'}</h1>
        <p>${isRegister ? '创建账号后即可选择套餐，按业务场景开通 HTTP、HTTPS、TCP 或 UDP 隧道。' : '登录后查看套餐权益、流量用量、隧道状态，并继续完成购买或续费。'}</p>
        <div class="auth-steps"><span>01 安全登录</span><span>02 开通套餐</span><span>03 服务上线</span></div>
      </section>
      <section class="auth-card" aria-label="${isRegister ? '注册账号' : '密码登录'}">
        <div class="card-title">
          <span class="badge blue">${isRegister ? 'Register' : 'Login'}</span>
          <h2>${isRegister ? '创建账号' : '密码登录'}</h2>
          <p>${isRegister ? '已有账号？' : '还没有账号？'} <a href="#/${isRegister ? 'login' : 'register'}" data-route="/${isRegister ? 'login' : 'register'}">${isRegister ? '去登录' : '立即注册'}</a></p>
        </div>
        <div class="form-stack">
          <label class="field"><span>邮箱地址</span><input class="input" id="email" type="email" autocomplete="email" placeholder="you@example.com"></label>
          <label class="field"><span>登录密码</span><input class="input" id="password" type="password" autocomplete="${isRegister ? 'new-password' : 'current-password'}" placeholder="至少 4 位"></label>
          ${isRegister ? `<label class="field"><span>邮箱验证码</span><div class="inline-form"><input class="input" id="code" placeholder="请输入收到的验证码"><button class="btn secondary" id="sendCodeBtn">发送验证码</button></div></label>` : ''}
          <button class="btn primary full" id="${isRegister ? 'registerBtn' : 'loginBtn'}">${isRegister ? '注册账号' : '登录控制台'}</button>
        </div>
        <div class="mini-log" id="authLog">${isRegister ? '填写邮箱后发送验证码。' : '请输入邮箱和密码。'}</div>
      </section>
    </main>
    ${footer()}
  </div>`;
  bindRouteLinks(app);
  if (isRegister) bindRegisterActions(); else bindLoginActions();
}
function writeAuth(message) { const el = $('authLog'); if (el) el.textContent = typeof message === 'string' ? message : JSON.stringify(message, null, 2); }
function bindLoginActions() {
  $('loginBtn').onclick = async () => {
    try {
      const data = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ email: $('email').value, password: $('password').value }) });
      state.token = data.access_token;
      localStorage.setItem('token', state.token);
      pushLog('登录成功');
      navigate('/app/overview');
    } catch (error) { writeAuth(error.message); }
  };
}
function bindRegisterActions() {
  $('sendCodeBtn').onclick = async () => {
    try {
      const data = await api('/api/auth/send-email-code', { method: 'POST', body: JSON.stringify({ email: $('email').value, purpose: 'register' }) });
      if (data && data.dev_code) $('code').value = data.dev_code;
      writeAuth('验证码已发送' + (data && data.dev_code ? `：${data.dev_code}` : '。'));
    } catch (error) { writeAuth(error.message); }
  };
  $('registerBtn').onclick = async () => {
    try {
      await api('/api/auth/register', { method: 'POST', body: JSON.stringify({ email: $('email').value, password: $('password').value, code: $('code').value }) });
      writeAuth('注册成功，正在进入登录页。');
      setTimeout(() => navigate('/login'), 450);
    } catch (error) { writeAuth(error.message); }
  };
}

async function loadDashboardData() {
  if (!state.token) return;
  state.loading = true;
  try {
    state.me = await api('/api/auth/me');
    try {
      state.subscription = await api('/api/user/subscription');
      state.activeSubscription = state.subscription.status === 'active';
    } catch (_) {
      state.subscription = null;
      state.activeSubscription = false;
    }
    state.traffic = await api('/api/user/traffic').catch(() => null);
    state.plans = (await api('/api/user/plans').catch(() => [])) || [];
    state.tunnels = (await api('/api/tunnels').catch(() => [])) || [];
  } finally {
    state.loading = false;
  }
}
async function renderConsole(route) {
  app.innerHTML = consoleSkeleton(route, '<div class="page-card skeleton">加载控制台数据...</div>');
  bindConsoleActions();
  try {
    await loadDashboardData();
    app.innerHTML = consoleSkeleton(route, renderConsolePage(route));
    bindConsoleActions();
    bindPageActions(route);
  } catch (error) {
    if (/认证|登录|Unauthorized|UNAUTHORIZED/i.test(error.message)) {
      state.token = '';
      localStorage.removeItem('token');
      return navigate('/login');
    }
    app.innerHTML = consoleSkeleton(route, `<div class="page-card error-card"><h2>加载失败</h2><p>${h(error.message)}</p><button class="btn primary" id="retryBtn">重试</button></div>`);
    bindConsoleActions();
    $('retryBtn').onclick = render;
  }
}
function consoleSkeleton(route, body) {
  const active = navItems.find(([r]) => r === route) || navItems[0];
  return `<div class="console-shell ${state.sidebarCollapsed ? 'is-collapsed' : ''}">
    <aside class="console-side">
      <div class="side-head">
        <a class="brand console-brand" href="#/app/overview" data-route="/app/overview"><span class="logo-mark"></span><span><strong>FRP Panel</strong><small>${h(state.me?.email || 'User console')}</small></span></a>
        <button class="side-toggle" id="userSidebarToggle" title="展开/收起侧栏" aria-label="展开/收起侧栏">${state.sidebarCollapsed ? '›' : '‹'}</button>
      </div>
      <nav class="console-nav" aria-label="控制台导航">
        ${navItems.map(([r, label, desc]) => `<a class="${r === route ? 'active' : ''}" href="#${r}" data-route="${r}"><b>${label}</b><small>${desc}</small></a>`).join('')}
      </nav>
    </aside>
    <main class="console-main">
      <header class="console-top">
        <div><span class="eyebrow">User console</span><h1>${h(active[1])}</h1><p>${h(active[2])}</p></div>
        <div class="top-actions"><button class="btn secondary" id="refreshBtn">刷新</button><button class="btn danger" id="logoutBtn">退出</button></div>
      </header>
      <section class="console-page">${body}</section>
    </main>
  </div>`;
}
function bindConsoleActions() {
  bindRouteLinks(app);
  const toggleBtn = $('userSidebarToggle');
  if (toggleBtn) toggleBtn.onclick = toggleUserSidebar;
  const refreshBtn = $('refreshBtn');
  if (refreshBtn) refreshBtn.onclick = render;
  const logoutBtn = $('logoutBtn');
  if (logoutBtn) logoutBtn.onclick = () => {
    state.token = '';
    state.me = null;
    localStorage.removeItem('token');
    navigate('/login');
  };
}
function renderConsolePage(route) {
  if (route === '/app/billing') return renderBillingPage();
  if (route === '/app/tunnels') return renderTunnelsPage();
  if (route === '/app/traffic') return renderTrafficPage();
  if (route === '/app/certificates') return renderCertificatesPage();
  if (route === '/app/settings') return renderSettingsPage();
  return renderOverviewPage();
}
function renderOverviewPage() {
  const sub = state.subscription;
  const trafficLeft = state.traffic?.traffic_left_bytes ?? (sub ? sub.traffic_limit_bytes - sub.traffic_used_bytes : 0);
  return `<div class="metric-grid">
    <article class="metric-card"><span>登录邮箱</span><strong>${h(state.me?.email || '-')}</strong><em class="badge green">logged in</em></article>
    <article class="metric-card"><span>套餐状态</span><strong>${h(sub?.plan_name || '未开通')}</strong><em class="badge ${state.activeSubscription ? 'green' : 'red'}">${h(sub?.status || 'inactive')}</em></article>
    <article class="metric-card"><span>剩余流量</span><strong>${fmtBytes(trafficLeft)}</strong><em class="badge blue">today ${fmtBytes(state.traffic?.today_bytes)}</em></article>
    <article class="metric-card"><span>隧道数量</span><strong>${state.tunnels.length}</strong><em class="badge orange">tunnels</em></article>
  </div>
  <div class="two-column">
    <section class="page-card accent"><h2>下一步建议</h2><p>${state.activeSubscription ? '你已经有可用套餐，可以进入隧道管理创建 HTTP/TCP/UDP 映射。' : '先到“套餐与支付”购买或兑换套餐，再创建隧道。'}</p><a class="btn primary" href="#/${state.activeSubscription ? 'app/tunnels' : 'app/billing'}" data-route="/${state.activeSubscription ? 'app/tunnels' : 'app/billing'}">${state.activeSubscription ? '创建隧道' : '开通套餐'}</a></section>
    <section class="page-card"><h2>最近隧道</h2>${tunnelTable(state.tunnels.slice(0, 5))}</section>
  </div>`;
}
function renderBillingPage() {
  return `<div class="two-column wide-left">
    <section class="page-card"><h2>购买套餐</h2><p class="muted">选择套餐和支付方式后跳转易支付收银台，支付成功由通知接口自动开通。</p><label class="field"><span>支付方式</span><select class="input" id="payType"><option value="wxpay" selected>微信支付</option><option value="alipay">支付宝</option></select></label>${plansTable()}</section>
    <section class="page-card"><h2>兑换套餐</h2><p class="muted">已有兑换码可直接激活。</p><div class="form-stack"><label class="field"><span>兑换码</span><input class="input" id="redeemCode" placeholder="请输入套餐兑换码"></label><button class="btn primary" id="redeemBtn">兑换</button></div><div class="mini-log compact" id="billingLog">等待操作</div></section>
  </div>`;
}
function plansTable() {
  if (!state.plans.length) return '<div class="empty">暂无可购买套餐</div>';
  return `<div class="table-wrap"><table><thead><tr><th>套餐</th><th>价格</th><th>流量</th><th>限速</th><th>操作</th></tr></thead><tbody>${state.plans.map(plan => `<tr><td><b>${h(plan.name)}</b><small>${h(plan.description || '')}</small></td><td>${fmtMoney(plan.price_cents)}</td><td>${fmtBytes(plan.traffic_limit_bytes)}</td><td>${fmtMbpsFromKbps(plan.bandwidth_limit_kbps)}</td><td><button class="btn primary small" data-buy-plan="${plan.id}">去支付</button></td></tr>`).join('')}</tbody></table></div>`;
}
function renderTunnelsPage() {
  return `<div class="two-column wide-left">
    <section class="page-card"><h2>我的隧道</h2>${tunnelTable(state.tunnels)}</section>
    <section class="page-card"><h2>创建隧道</h2><p class="muted">${state.activeSubscription ? '填写本地服务信息后创建映射。' : '当前未开通套餐，创建按钮已禁用。'}</p><div class="form-stack">
      <label class="field"><span>隧道名称</span><input class="input" id="tunnelName" value="web" placeholder="例如 web、ssh、game"></label>
      <label class="field"><span>隧道协议</span><select class="input" id="tunnelType"><option value="http">HTTP</option><option value="https">HTTPS</option><option value="tcp">TCP</option><option value="udp">UDP</option></select></label>
      <label class="field"><span>本地地址</span><input class="input" id="localHost" value="127.0.0.1" placeholder="例如 127.0.0.1"></label>
      <label class="field"><span>本地端口</span><input class="input" id="localPort" value="8080" placeholder="例如 8080"></label>
      <label class="field"><span>绑定域名（HTTP/HTTPS）</span><input class="input" id="domain" placeholder="例如 app.example.com，TCP/UDP 可留空"></label>
      <label class="field"><span>隧道限速 Mbps</span><input class="input" id="bandwidthLimit" value="0" min="0" step="0.001" placeholder="0 表示继承套餐"></label>
      <p class="field-hint" id="bandwidthLimitHint">0 表示继承套餐限速</p>
      <button class="btn primary full" id="createTunnelBtn" ${state.activeSubscription ? '' : 'disabled'}>${state.activeSubscription ? '创建隧道' : '请先购买或兑换套餐'}</button>
    </div><div class="code">HTTP/HTTPS: app.user.com CNAME frp.example.com</div></section>
  </div>`;
}
function tunnelTable(tunnels) {
  if (!tunnels.length) return '<div class="empty">暂无隧道</div>';
  return `<div class="table-wrap"><table><thead><tr><th>名称</th><th>协议</th><th>入口</th><th>限速</th><th>状态</th></tr></thead><tbody>${tunnels.map(t => `<tr><td><b>${h(t.name)}</b></td><td>${h(t.type)}</td><td>${h(t.public_url || '')}<small>${h(t.local_host)}:${h(t.local_port)}</small></td><td>${fmtLimit(t)}</td><td><span class="badge orange">${h(t.status)}</span></td></tr>`).join('')}</tbody></table></div>`;
}
function renderTrafficPage() {
  return `<div class="two-column wide-left">
    <section class="page-card"><h2>流量上报</h2><p class="muted">用于客户端或测试环境上报隧道流量。</p><div class="form-stack">
      <label class="field"><span>隧道 ID</span><input class="input" id="reportTunnelId" placeholder="可留空；指定时只上报该隧道"></label>
      <label class="field"><span>入站流量 bytes</span><input class="input" id="bytesIn" value="1024" placeholder="例如 1024"></label>
      <label class="field"><span>出站流量 bytes</span><input class="input" id="bytesOut" value="2048" placeholder="例如 2048"></label>
      <button class="btn secondary full" id="reportTrafficBtn">上报流量</button>
    </div></section>
    <section class="page-card"><h2>操作日志</h2><div class="log" id="logBox">${h(state.logLines.join('\n'))}</div></section>
  </div>`;
}
function renderCertificatesPage() {
  return `<div class="two-column wide-left">
    <section class="page-card accent"><h2>申请 HTTPS 证书</h2><p class="muted">证书由用户端提交申请，后台统一查看和续期管理。申请前请先把域名 CNAME 到平台入口。</p><div class="form-stack">
      <label class="field"><span>申请证书的域名</span><input class="input" id="certDomain" placeholder="例如 app.example.com"></label>
      <label class="field"><span>证书联系邮箱</span><input class="input" id="certEmail" value="${h(state.me?.email || '')}" placeholder="可留空，默认使用账号邮箱"></label>
      <button class="btn primary full" id="requestUserCertBtn">提交证书申请</button>
    </div><div class="code">提示：HTTP/HTTPS 隧道域名完成解析后，再提交证书申请。</div></section>
    <section class="page-card"><h2>申请结果</h2><div class="log" id="certLog">等待提交</div></section>
  </div>`;
}
function renderSettingsPage() {
  return `<div class="two-column">
    <section class="page-card"><h2>账户信息</h2><dl class="info-list"><dt>邮箱</dt><dd>${h(state.me?.email || '-')}</dd><dt>套餐</dt><dd>${h(state.subscription?.plan_name || '未开通')}</dd><dt>状态</dt><dd>${h(state.subscription?.status || 'inactive')}</dd></dl></section>
    <section class="page-card"><h2>账号操作</h2><p class="muted">当前账号用于管理套餐、隧道、证书申请和流量记录。</p><div class="form-stack"><button class="btn danger" id="logoutBtn2">退出当前账号</button></div></section>
  </div>`;
}
function bindPageActions(route) {
  bindRouteLinks(app);
  if (route === '/app/billing') {
    document.querySelectorAll('[data-buy-plan]').forEach(button => {
      button.onclick = async () => {
        try {
          const order = await api('/api/payments/epay/orders', { method: 'POST', body: JSON.stringify({ plan_id: Number(button.dataset.buyPlan), pay_type: ($('payType')?.value || 'wxpay') }) });
          pushLog('订单已创建：' + order.out_trade_no);
          location.href = order.pay_url;
        } catch (error) { const el = $('billingLog'); if (el) el.textContent = error.message; }
      };
    });
    const redeemBtn = $('redeemBtn');
    if (redeemBtn) redeemBtn.onclick = async () => {
      try { const data = await api('/api/user/redeem', { method: 'POST', body: JSON.stringify({ code: $('redeemCode').value }) }); const el = $('billingLog'); if (el) el.textContent = '兑换成功：' + JSON.stringify(data); render(); } catch (error) { const el = $('billingLog'); if (el) el.textContent = error.message; }
    };
  }
  if (route === '/app/tunnels') {
    const limit = $('bandwidthLimit');
    if (limit) limit.addEventListener('input', updateBandwidthLimitHint);
    updateBandwidthLimitHint();
    const create = $('createTunnelBtn');
    if (create) create.onclick = async () => {
      try {
        if (!state.activeSubscription) { pushLog('请先购买套餐或兑换套餐，再创建隧道。'); return; }
        const body = { name: $('tunnelName').value, type: $('tunnelType').value, local_host: $('localHost').value, local_port: Number($('localPort').value), domain: $('domain').value, use_https: $('tunnelType').value === 'https', bandwidth_limit_kbps: mbpsToKbps(Number($('bandwidthLimit').value) || 0) };
        const created = await api('/api/tunnels', { method: 'POST', body: JSON.stringify(body) });
        pushLog('隧道创建成功：' + created.name);
        render();
      } catch (error) { pushLog(error.message); }
    };
  }
  if (route === '/app/traffic') {
    const report = $('reportTrafficBtn');
    if (report) report.onclick = async () => {
      try {
        const data = await api('/api/client/traffic', { method: 'POST', body: JSON.stringify({ reports: [{ tunnel_id: Number($('reportTunnelId').value) || 0, bytes_in: Number($('bytesIn').value) || 0, bytes_out: Number($('bytesOut').value) || 0 }] }) });
        pushLog(data || '流量上报成功');
        render();
      } catch (error) { pushLog(error.message); }
    };
  }
  if (route === '/app/certificates') {
    const requestBtn = $('requestUserCertBtn');
    if (requestBtn) requestBtn.onclick = async () => {
      try {
        const data = await api('/api/user/certificates/request', { method: 'POST', body: JSON.stringify({ domain: $('certDomain').value, email: $('certEmail').value }) });
        const el = $('certLog');
        if (el) el.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        const el = $('certLog');
        if (el) el.textContent = error.message;
      }
    };
  }
  if (route === '/app/settings') {
    const logout2 = $('logoutBtn2');
    if (logout2) logout2.onclick = () => { state.token = ''; localStorage.removeItem('token'); navigate('/login'); };
  }
}
function updateBandwidthLimitHint() {
  const input = $('bandwidthLimit');
  const hint = $('bandwidthLimitHint');
  if (!input || !hint) return;
  const limit = Number(input.value) || 0;
  hint.textContent = limit > 0 ? '约 ' + (limit / 8).toFixed(3) + ' MB/s' : '0 表示继承套餐限速';
}

async function render() {
  const route = normalizeRoute(currentRoute());
  if (route !== currentRoute()) return navigate(route);
  if (route === '/login') return renderAuth('login');
  if (route === '/register') return renderAuth('register');
  if (route.startsWith('/app')) return renderConsole(route);
  return renderLanding();
}
window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
