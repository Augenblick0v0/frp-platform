<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FRP Tunnel - 启动隧道</title>
  <link rel="stylesheet" href="style.css?v=start-center-20260708">
</head>
<body>
<div id="app"></div>
<script>
const $ = id => document.getElementById(id);
const app = $('app');
const state = { token: localStorage.getItem('token') || '', me: null, subscription: null, traffic: null, tunnels: [], clientConfig: null, activeSubscription: false, logLines: ['ready'] };
function h(value) { return String(value ?? '').replace(/[&<>'"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch])); }
function route() { return location.hash.replace(/^#/, '') || '/'; }
function navigate(path) { if (route() === path) render(); else location.hash = path; }
function normalize(path) { if (!path || path === '/') return '/'; if (path === '/app') return '/app/start'; if (path.startsWith('/app') && !state.token) return '/login'; if ((path === '/login' || path === '/register') && state.token) return '/app/start'; return ['/','/login','/register','/app/start'].includes(path) ? path : '/app/start'; }
function apiOrigin() { return location.origin.replace(/\/$/, ''); }
async function api(path, opts = {}) { const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) }; if (state.token) headers.Authorization = 'Bearer ' + state.token; const res = await fetch(apiOrigin() + path, { ...opts, headers }); const json = await res.json().catch(() => ({ success: false, message: res.statusText })); if (!res.ok || json.success === false) throw new Error(json.message || res.statusText); return json.data; }
function fmtBytes(n) { n = Number(n) || 0; if (n <= 0) return '-'; const u = ['B','KB','MB','GB','TB']; let i = 0; while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; } return (i === 0 ? n.toFixed(0) : n.toFixed(1)) + ' ' + u[i]; }
function fmtMbps(v) { return (!v || v < 0) ? '-' : (v / 1000).toFixed(2) + ' Mbps'; }
function bindRoutes(root = document) { root.querySelectorAll('[data-route]').forEach(el => el.onclick = e => { e.preventDefault(); navigate(el.dataset.route); }); }
function header(kind='public') { return `<header class="site-header ${kind === 'auth' ? 'auth-header' : ''}"><a class="brand" href="#/" data-route="/"><span class="logo-mark"></span><span><strong>FRP Tunnel</strong><small>启动隧道中心</small></span></a><nav class="site-nav"><a href="/workbench.html#/app/tunnels">高级工作台</a><a href="#/login" data-route="/login">登录</a><a class="nav-pill" href="#/register" data-route="/register">注册</a></nav></header>`; }
function footer() { return `<footer class="site-footer"><span>FRP Tunnel Platform</span><span>主站只负责启动；创建、测速、证书在高级工作台完成</span></footer>`; }
function landing() { app.innerHTML = `<div class="public-page">${header()}<main class="landing-main"><section class="hero-panel start-hero"><div class="hero-copy"><span class="eyebrow">Start tunnels</span><h1>打开客户端，启动已经配置好的隧道。</h1><p>主用户端现在专注于“启动隧道”：查看套餐、复制连接信息、打开客户端控制台。创建隧道、测速、证书和高级配置已拆到独立工作台。</p><div class="hero-actions"><a class="btn primary" href="#/login" data-route="/login">登录启动隧道</a><a class="btn secondary" href="/workbench.html#/app/tunnels">进入高级工作台</a></div></div><div class="hero-console-card"><div class="window-dots"><i></i><i></i><i></i></div><div class="preview-row"><span>主流程</span><strong>启动 frpc</strong></div><div class="preview-row"><span>高级工作台</span><strong>创建 / 测速 / 证书</strong></div><div class="preview-meter"><b style="width:82%"></b></div></div></section></main>${footer()}</div>`; bindRoutes(app); }
function auth(mode) { const isReg = mode === 'register'; app.innerHTML = `<div class="auth-page">${header('auth')}<main class="auth-main"><section class="auth-visual"><span class="eyebrow">${isReg ? 'Create account' : 'Password login'}</span><h1>${isReg ? '注册后进入启动中心。' : '登录后启动你的隧道。'}</h1><p>${isReg ? '创建账号后可购买套餐，并在高级工作台配置隧道。' : '主站只展示启动所需信息，高级操作请进入工作台。'}</p><div class="auth-steps"><span>01 登录</span><span>02 复制连接信息</span><span>03 启动 frpc</span></div></section><section class="auth-card"><div class="card-title"><span class="badge blue">${isReg ? 'Register' : 'Login'}</span><h2>${isReg ? '创建账号' : '密码登录'}</h2><p>${isReg ? '已有账号？' : '还没有账号？'} <a href="#/${isReg ? 'login' : 'register'}" data-route="/${isReg ? 'login' : 'register'}">${isReg ? '去登录' : '立即注册'}</a></p></div><div class="form-stack"><label class="field"><span>邮箱地址</span><input class="input" id="email" type="email" autocomplete="email"></label><label class="field"><span>登录密码</span><input class="input" id="password" type="password"></label>${isReg ? `<label class="field"><span>邮箱验证码</span><div class="inline-form"><input class="input" id="code"><button class="btn secondary" id="sendCodeBtn">发送验证码</button></div></label>` : ''}<button class="btn primary full" id="${isReg ? 'registerBtn' : 'loginBtn'}">${isReg ? '注册账号' : '登录启动中心'}</button></div><div class="mini-log" id="authLog">${isReg ? '填写邮箱后发送验证码。' : '请输入邮箱和密码。'}</div></section></main>${footer()}</div>`; bindRoutes(app); isReg ? bindRegister() : bindLogin(); }
function writeAuth(msg) { const el = $('authLog'); if (el) el.textContent = msg; }
function bindLogin() { $('loginBtn').onclick = async () => { try { const data = await api('/api/auth/login', { method:'POST', body: JSON.stringify({ email: $('email').value, password: $('password').value }) }); state.token = data.access_token; localStorage.setItem('token', state.token); navigate('/app/start'); } catch(e) { writeAuth(e.message); } }; }
function bindRegister() { $('sendCodeBtn').onclick = async () => { try { const data = await api('/api/auth/send-email-code', { method:'POST', body: JSON.stringify({ email: $('email').value, purpose: 'register' }) }); writeAuth('?????????????'); } catch(e) { writeAuth(e.message); } }; $('registerBtn').onclick = async () => { try { await api('/api/auth/register', { method:'POST', body: JSON.stringify({ email: $('email').value, password: $('password').value, code: $('code').value }) }); writeAuth('注册成功，请登录。'); setTimeout(() => navigate('/login'), 400); } catch(e) { writeAuth(e.message); } }; }
async function loadStart() { state.me = await api('/api/auth/me'); try { state.subscription = await api('/api/user/subscription'); state.activeSubscription = state.subscription.status === 'active'; } catch { state.subscription = null; state.activeSubscription = false; } state.traffic = await api('/api/user/traffic').catch(() => null); state.tunnels = await api('/api/tunnels').catch(() => []); state.clientConfig = await api('/api/client/tunnels').catch(() => null); }
function tunnelRows() { if (!state.tunnels.length) return '<div class="empty">暂无隧道。请进入高级工作台创建后，再回到这里启动。</div>'; return `<div class="table-wrap"><table><thead><tr><th>名称</th><th>协议</th><th>公网入口</th><th>本地服务</th><th>状态</th></tr></thead><tbody>${state.tunnels.map(t => `<tr><td><b>${h(t.name)}</b></td><td>${h(t.type)}</td><td>${h(t.public_url || '')}</td><td>${h(t.local_host)}:${h(t.local_port)}</td><td><span class="badge orange">${h(t.status)}</span></td></tr>`).join('')}</tbody></table></div>`; }
function startPage() { const sub = state.subscription; const trafficLeft = state.traffic?.traffic_left_bytes ?? (sub ? sub.traffic_limit_bytes - sub.traffic_used_bytes : 0); const cfg = state.clientConfig || {}; app.innerHTML = `<div class="start-shell"><header class="console-top start-top"><div><span class="eyebrow">Start center</span><h1>启动隧道</h1><p>只保留启动所需信息；创建、测速、证书和购买请进入高级工作台。</p></div><div class="top-actions"><a class="btn secondary" href="/workbench.html#/app/tunnels">高级工作台</a><button class="btn danger" id="logoutBtn">退出</button></div></header><main class="console-page"><div class="metric-grid"><article class="metric-card"><span>登录邮箱</span><strong>${h(state.me?.email || '-')}</strong><em class="badge green">已登录</em></article><article class="metric-card"><span>套餐状态</span><strong>${h(sub?.plan_name || '未开通')}</strong><em class="badge ${state.activeSubscription ? 'green' : 'red'}">${h(sub?.status || 'inactive')}</em></article><article class="metric-card"><span>剩余流量</span><strong>${fmtBytes(trafficLeft)}</strong><em class="badge blue">today ${fmtBytes(state.traffic?.today_bytes)}</em></article><article class="metric-card"><span>已有隧道</span><strong>${state.tunnels.length}</strong><em class="badge orange">只启动不创建</em></article></div><div class="two-column wide-left"><section class="page-card accent"><h2>客户端启动步骤</h2><ol class="start-steps"><li>打开本地客户端控制台或桌面客户端。</li><li>API 地址填写：<code>${h(apiOrigin())}</code></li><li>登录 Token 使用下方按钮复制。</li><li>同步配置后点击“启动 frpc”。</li></ol><div class="form-stack"><button class="btn primary" id="copyTokenBtn">复制登录 Token</button><button class="btn secondary" id="copyConfigBtn">复制连接摘要</button><a class="btn secondary" href="/workbench.html#/app/speedtest">去工作台测速</a></div><div class="mini-log" id="startLog">等待操作</div></section><section class="page-card"><h2>连接摘要</h2><dl class="info-list"><dt>服务器地址</dt><dd>${h(cfg.server_addr || '-')}</dd><dt>frps 端口</dt><dd>${h(cfg.server_port || '-')}</dd><dt>套餐限速</dt><dd>${fmtMbps(cfg.bandwidth_limit_kbps)}</dd><dt>工作台</dt><dd><a href="/workbench.html#/app/tunnels">创建/管理隧道</a></dd></dl></section></div><section class="page-card"><h2>将要启动的隧道</h2>${tunnelRows()}</section></main></div>`; $('logoutBtn').onclick = () => { state.token=''; localStorage.removeItem('token'); navigate('/login'); }; $('copyTokenBtn').onclick = async () => { await navigator.clipboard.writeText(state.token); $('startLog').textContent='Token 已复制。'; }; $('copyConfigBtn').onclick = async () => { await navigator.clipboard.writeText(`API=${apiOrigin()}\nTOKEN=${state.token}\nSERVER=${cfg.server_addr || ''}:${cfg.server_port || ''}`); $('startLog').textContent='连接摘要已复制。'; }; }
async function render() { const r = normalize(route()); if (r !== route()) return navigate(r); if (r === '/') return landing(); if (r === '/login') return auth('login'); if (r === '/register') return auth('register'); if (r === '/app/start') { app.innerHTML='<div class="start-shell"><div class="page-card skeleton">加载启动信息...</div></div>'; try { await loadStart(); return startPage(); } catch(e) { state.token=''; localStorage.removeItem('token'); return navigate('/login'); } } }
window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
