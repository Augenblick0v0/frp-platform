<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FRP User Panel</title><link rel="stylesheet" href="style.css"></head><body><div class="shell"><aside class="side"><div class="brand"><div class="logo"></div>FRP Panel</div><nav class="nav"><a class="active">概览</a><a>我的订阅</a><a>兑换套餐</a><a>隧道列表</a><a>购买套餐</a></nav></aside><main class="main"><div class="top"><div><div class="eyebrow">User console</div><h1 class="title">我的内网穿透</h1><p class="subtitle">兑换套餐后创建 TCP、UDP、HTTP、HTTPS 隧道。</p></div><button class="btn primary">新增隧道</button></div><section class="card hero"><h2>当前套餐：高级套餐</h2><p>支持自定义域名、HTTPS 自动证书、TCP/UDP 自动端口分配。</p><div class="grid cards"><div><div class="label">到期时间</div><div class="metric">30 天</div></div><div><div class="label">剩余流量</div><div class="metric">100 GB</div></div><div><div class="label">限速</div><div class="metric">10 Mbps</div></div><div><div class="label">域名额度</div><div class="metric">10</div></div></div></section><section class="split" style="margin-top:16px"><div class="card"><h2>创建 HTTPS 隧道</h2><div class="form"><input class="input" placeholder="隧道名称"><input class="input" placeholder="本地地址，例如 127.0.0.1"><input class="input" placeholder="本地端口，例如 8080"><input class="input" placeholder="绑定域名，例如 app.user.com"><button class="btn primary">创建并检测 CNAME</button></div></div><div class="card"><h2>CNAME 指引</h2><p>请到域名服务商添加：</p><div class="code">app.user.com CNAME frp.example.com</div><p><span class="badge orange">等待解析生效</span></p></div></section></main></div></body></html>
