<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FRP 用户控制台</title><link rel="stylesheet" href="style.css?v=user-console-20260709"></head><body><div id="app"></div><script>
const $=id=>document.getElementById(id),app=$('app');
const st={token:localStorage.getItem('token')||'',collapsed:localStorage.getItem('userSidebarCollapsedV3')==='true',local:localStorage.getItem('localClientBase')||'http://127.0.0.1:18080',localToken:localStorage.getItem('localClientToken')||'',me:null,sub:null,traffic:null,tunnels:[],plans:[],nodes:[],active:false,logs:['ready']};
const nav=[['/app/overview','控制面板','资源总览'],['/app/create','创建隧道','新建映射'],['/app/tunnels','隧道管理','查看状态'],['/app/nodes','节点监控','节点状态'],['/app/download','客户端下载','本地程序'],['/app/help','帮助中心','接入指引'],['/app/account','用户中心','账号资料'],['/app/billing','订单支付','套餐购买'],['/app/domains','域名证书','HTTPS 证书'],['/app/speedtest','隧道测速','一键测速']];
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const route=()=>location.hash.replace(/^#/,'')||'/'; const go=r=>{route()===r?render():location.hash=r};
function norm(r){if(!r||r==='/')return'/'; if(r.startsWith('/app')&&!st.token)return'/login'; if((r==='/login'||r==='/register')&&st.token)return'/app/overview'; if(r==='/app')return'/app/overview'; if(r.startsWith('/app')&&!nav.some(x=>x[0]===r))return'/app/overview'; return r}
const apiBase=()=>location.origin.replace(/\/$/,'');
async function api(p,o={}){const h={'Content-Type':'application/json',...(o.headers||{})}; if(st.token)h.Authorization='Bearer '+st.token; const r=await fetch(apiBase()+p,{...o,headers:h}); const j=await r.json().catch(()=>({success:false,message:r.statusText})); if(!r.ok||j.success===false)throw Error(j.message||r.statusText); return j.data}
async function localApi(p,b={}){const r=await fetch(st.local.replace(/\/$/,'')+p,{method:'POST',headers:{'Content-Type':'application/json','X-Local-Token':st.localToken},body:JSON.stringify(b)}); const j=await r.json().catch(()=>({success:false,message:r.statusText})); if(!r.ok||j.success===false)throw Error(j.message||r.statusText); return j.data}
const bytes=n=>{n=+n||0;if(n<=0)return'-';let u=['B','KB','MB','GB','TB'],i=0;while(n>=1024&&i<u.length-1){n/=1024;i++}return (i?n.toFixed(1):n.toFixed(0))+' '+u[i]};
const mbps=k=>(!k||k<0)?'-':(+k/1000).toFixed(2)+' Mbps'; const money=c=>'¥'+((+c||0)/100).toFixed(2); const time=v=>v?new Date(v).toLocaleString():'-'; const kb=v=>(!v||v<0)?0:Math.round(v*1000);
function links(root=document){root.querySelectorAll('[data-route]').forEach(a=>a.onclick=e=>{e.preventDefault();go(a.dataset.route)})}
function shortLabel(s){const a=Array.from(s); if(a.length===4)return '<span>'+esc(a.slice(0,2).join(''))+'</span><span>'+esc(a.slice(2).join(''))+'</span>'; return a.map(x=>'<span>'+esc(x)+'</span>').join('')}
function badge(s){s=String(s||'unknown');let c=/active|online|paid|success|logged/i.test(s)?'green':/pending|created|checking/i.test(s)?'orange':/error|fail|deleted|expired|inactive/i.test(s)?'red':'blue';return '<span class="badge '+c+'">'+esc(s)+'</span>'}
function header(){return '<header class="site-header"><a class="brand" href="#/" data-route="/"><span class="logo-mark"></span><span><strong>FRP Tunnel</strong><small>Cloud Edge Access</small></span></a><nav class="site-nav"><a href="#/" data-route="/">首页</a><a href="#/login" data-route="/login">登录</a><a class="nav-pill" href="#/register" data-route="/register">注册</a></nav></header>'}
function landing(){app.innerHTML='<div class="public-page">'+header()+'<main class="landing-main"><section class="hero-panel"><div class="hero-copy"><span class="eyebrow">Private network access</span><h1>把飞牛 NAS 和本地服务，变成可访问的云边缘入口。</h1><p>面向 NAS 外网访问、远程办公、游戏联机和开发联调，提供套餐购买、域名映射、流量统计、多协议隧道和 API 托管测速。</p><div class="hero-actions"><a class="btn primary" href="#/login" data-route="/login">登录控制台</a><a class="btn secondary" href="#/register" data-route="/register">注册账号</a></div></div><div class="hero-console-card"><div class="window-dots"><i></i><i></i><i></i></div><div class="preview-row"><span>HTTP / HTTPS</span><strong>域名映射</strong></div><div class="preview-row"><span>TCP / UDP</span><strong>游戏与远程桌面</strong></div><div class="preview-row"><span>Speed Test</span><strong>API 发起探测</strong></div><div class="preview-meter"><b style="width:78%"></b></div></div></section></main><footer class="site-footer"><span>FRP Tunnel Platform</span><span>后台、用户控制台、本地客户端三端分离</span></footer></div>';links(app)}
function auth(m){let reg=m==='register';app.innerHTML='<div class="auth-page">'+header()+'<main class="auth-main"><section class="auth-visual"><span class="eyebrow">'+(reg?'Create account':'Password login')+'</span><h1>'+(reg?'注册后开始创建隧道。':'登录后进入用户控制台。')+'</h1><p>'+(reg?'创建账号后可购买套餐，按业务场景开通 HTTP、HTTPS、TCP 或 UDP 隧道。':'查看套餐权益、流量用量、隧道状态，并完成购买、兑换和测速。')+'</p><div class="auth-steps"><span>01 安全登录</span><span>02 开通套餐</span><span>03 服务上线</span></div></section><section class="auth-card"><div class="card-title"><span class="badge blue">'+(reg?'Register':'Login')+'</span><h2>'+(reg?'创建账号':'密码登录')+'</h2><p>'+(reg?'已有账号？':'还没有账号？')+' <a href="#/'+(reg?'login':'register')+'" data-route="/'+(reg?'login':'register')+'">'+(reg?'去登录':'立即注册')+'</a></p></div><div class="form-stack"><label class="field"><span>邮箱地址</span><input class="input" id="email" type="email"></label><label class="field"><span>登录密码</span><input class="input" id="password" type="password"></label>'+(reg?'<label class="field"><span>邮箱验证码</span><div class="inline-form"><input class="input" id="code"><button class="btn secondary" id="sendCodeBtn">发送验证码</button></div></label>':'')+'<button class="btn primary full" id="'+(reg?'registerBtn':'loginBtn')+'">'+(reg?'注册账号':'登录控制台')+'</button></div><div class="mini-log" id="authLog">请输入账号信息。</div></section></main></div>';links(app); reg?bindReg():bindLogin()}
function logAuth(t){$('authLog').textContent=t} function bindLogin(){$('loginBtn').onclick=async()=>{try{let d=await api('/api/auth/login',{method:'POST',body:JSON.stringify({email:$('email').value,password:$('password').value})});st.token=d.access_token;localStorage.setItem('token',st.token);go('/app/overview')}catch(e){logAuth(e.message)}}}
function bindReg(){$('sendCodeBtn').onclick=async()=>{try{let d=await api('/api/auth/send-email-code',{method:'POST',body:JSON.stringify({email:$('email').value,purpose:'register'})});logAuth('????????????')}catch(e){logAuth(e.message)}};$('registerBtn').onclick=async()=>{try{await api('/api/auth/register',{method:'POST',body:JSON.stringify({email:$('email').value,password:$('password').value,code:$('code').value})});logAuth('注册成功，请登录');setTimeout(()=>go('/login'),400)}catch(e){logAuth(e.message)}}}
async function load(){st.me=await api('/api/auth/me');try{st.sub=await api('/api/user/subscription');st.active=st.sub.status==='active'}catch{st.sub=null;st.active=false} st.traffic=await api('/api/user/traffic').catch(()=>null);st.plans=await api('/api/user/plans').catch(()=>[]);st.tunnels=await api('/api/tunnels').catch(()=>[]);st.nodes=await api('/api/user/nodes').catch(()=>[])}
function shell(r,body){let a=nav.find(x=>x[0]===r)||nav[0];return '<div class="console-shell '+(st.collapsed?'is-collapsed':'')+'"><aside class="console-side"><div class="side-head"><a class="brand console-brand" href="#/app/overview" data-route="/app/overview"><span class="logo-mark"></span><span><strong>FRP 控制台</strong><small>'+esc(st.me?.email||'User')+'</small></span></a><button class="side-toggle" id="tog">'+(st.collapsed?'›':'‹')+'</button></div><nav class="console-nav">'+nav.map(x=>'<a class="'+(x[0]===r?'active':'')+'" href="#'+x[0]+'" data-route="'+x[0]+'"><b>'+(st.collapsed?shortLabel(x[1]):esc(x[1]))+'</b><small>'+esc(x[2])+'</small></a>').join('')+'</nav></aside><main class="console-main"><header class="console-top"><div><span class="eyebrow">User console</span><h1>'+esc(a[1])+'</h1><p>'+esc(a[2])+'</p></div><div class="top-actions"><button class="btn secondary" id="refreshBtn">刷新</button><button class="btn danger" id="logoutBtn">退出</button></div></header><section class="console-page">'+body+'</section></main></div>'}
async function consolePage(r){app.innerHTML=shell(r,'<div class="page-card skeleton">加载控制台数据...</div>');bindShell();try{await load();app.innerHTML=shell(r,page(r));bindShell();bindPage(r)}catch(e){if(/Unauthorized|认证|登录/i.test(e.message)){st.token='';localStorage.removeItem('token');return go('/login')}app.innerHTML=shell(r,'<div class="page-card error-card"><h2>加载失败</h2><p>'+esc(e.message)+'</p></div>');bindShell()}}
function bindShell(){links(app);let t=$('tog');if(t)t.onclick=()=>{st.collapsed=!st.collapsed;localStorage.setItem('userSidebarCollapsedV3',String(st.collapsed));render()};let r=$('refreshBtn');if(r)r.onclick=render;let l=$('logoutBtn');if(l)l.onclick=()=>{st.token='';localStorage.removeItem('token');go('/login')}}
function page(r){return r==='/app/create'?createPage():r==='/app/tunnels'?'<section class="page-card"><h2>我的隧道</h2>'+tunnelTable(st.tunnels)+'</section>':r==='/app/nodes'?nodesPage():r==='/app/download'?downloadPage():r==='/app/help'?helpPage():r==='/app/account'?accountPage():r==='/app/billing'?billingPage():r==='/app/domains'?domainPage():r==='/app/speedtest'?speedPage():overview()}
function overview(){let left=st.traffic?.traffic_left_bytes??(st.sub?st.sub.traffic_limit_bytes-st.sub.traffic_used_bytes:0),on=st.nodes.filter(n=>n.status==='online').length;return '<div class="metric-grid"><article class="metric-card"><span>登录邮箱</span><strong>'+esc(st.me?.email||'-')+'</strong><em class="badge green">logged in</em></article><article class="metric-card"><span>套餐状态</span><strong>'+esc(st.sub?.plan_name||'未开通')+'</strong>'+badge(st.sub?.status||'inactive')+'</article><article class="metric-card"><span>剩余流量</span><strong>'+bytes(left)+'</strong><em class="badge blue">today '+bytes(st.traffic?.today_bytes)+'</em></article><article class="metric-card"><span>可用节点</span><strong>'+on+'/'+(st.nodes.length||1)+'</strong><em class="badge orange">nodes</em></article></div><div class="two-column"><section class="page-card accent"><h2>下一步建议</h2><p>'+(st.active?'你已经有可用套餐，可以创建隧道，或启动本地客户端后运行一键测速。':'先到“订单支付”购买或兑换套餐，再创建隧道。')+'</p><div class="hero-actions"><a class="btn primary" href="#'+(st.active?'/app/create':'/app/billing')+'" data-route="'+(st.active?'/app/create':'/app/billing')+'">'+(st.active?'创建隧道':'开通套餐')+'</a><a class="btn secondary" href="#/app/download" data-route="/app/download">下载客户端</a></div></section><section class="page-card"><h2>最近隧道</h2>'+tunnelTable(st.tunnels.slice(0,5))+'</section></div>'}
function planRows(){if(!st.plans.length)return'<div class="empty">暂无可购买套餐</div>';return'<div class="table-wrap"><table><thead><tr><th>套餐</th><th>价格</th><th>流量</th><th>限速</th><th>操作</th></tr></thead><tbody>'+st.plans.map(p=>'<tr><td><b>'+esc(p.name)+'</b><small>'+esc(p.description||'')+'</small></td><td>'+money(p.price_cents)+'</td><td>'+bytes(p.traffic_limit_bytes)+'</td><td>'+mbps(p.bandwidth_limit_kbps)+'</td><td><button class="btn primary small" data-buy-plan="'+p.id+'">去支付</button></td></tr>').join('')+'</tbody></table></div>'}
function billingPage(){return'<div class="two-column wide-left"><section class="page-card"><h2>购买套餐</h2><p class="muted">选择套餐和支付方式后跳转易支付收银台。</p><label class="field"><span>支付方式</span><select class="input" id="payType"><option value="wxpay">微信支付</option><option value="alipay">支付宝</option></select></label>'+planRows()+'</section><section class="page-card"><h2>兑换套餐</h2><p class="muted">兑换码本身已经绑定套餐。</p><div class="form-stack"><label class="field"><span>兑换码</span><input class="input" id="redeemCode"></label><button class="btn primary" id="redeemBtn">兑换</button></div><div class="mini-log compact" id="billingLog">等待操作</div></section></div>'}
function createPage(){let opts=(st.nodes.length?st.nodes:[{id:0,name:'????',status:'online'}]).map(n=>'<option value="'+esc(n.id)+'">'+esc(n.name)+' ('+esc(n.status||'online')+')</option>').join('');return'<div class="two-column wide-left"><section class="page-card accent"><h2>创建隧道</h2><div class="form-stack"><label class="field"><span>隧道名称</span><input class="input" id="tunnelName" value="web"></label><label class="field"><span>协议</span><select class="input" id="tunnelType"><option value="http">HTTP</option><option value="https">HTTPS</option><option value="tcp">TCP</option><option value="udp">UDP</option></select></label><label class="field"><span>??</span><select class="input" id="tunnelNode">'+opts+'</select></label><label class="field"><span>本地地址</span><input class="input" id="localHost" value="127.0.0.1"></label><label class="field"><span>本地端口</span><input class="input" id="localPort" value="8080"></label><label class="field"><span>绑定域名（HTTP/HTTPS）</span><input class="input" id="domain" placeholder="app.example.com"></label><label class="field"><span>隧道限速 Mbps</span><input class="input" id="bandwidthLimit" value="0" min="0" step="0.001"></label><p class="field-hint" id="limitHint">0 表示继承套餐限速</p><button class="btn primary full" id="createTunnelBtn" '+(st.active?'':'disabled')+'>'+(st.active?'创建隧道':'请先开通套餐')+'</button></div></section><section class="page-card"><h2>创建说明</h2><dl class="info-list"><dt>HTTP/HTTPS</dt><dd>填写域名并 CNAME 到平台入口。</dd><dt>TCP/UDP</dt><dd>系统自动分配远程端口。</dd><dt>客户端</dt><dd>创建后同步本地客户端并启动 frpc。</dd></dl></section></div>'}
function tunnelTable(a){if(!a.length)return'<div class="empty">暂无隧道</div>';return'<div class="table-wrap"><table><thead><tr><th>名称</th><th>协议</th><th>入口</th><th>本地</th><th>限速</th><th>状态</th><th>??</th></tr></thead><tbody>'+a.map(t=>'<tr><td><b>'+esc(t.name)+'</b><small>'+(t.speed_test?'临时测速':'正式隧道')+'</small></td><td>'+esc(t.type)+'</td><td>'+esc(t.public_url||'')+'</td><td>'+esc(t.local_host)+':'+esc(t.local_port)+'</td><td>'+mbps(t.effective_bandwidth_limit_kbps||t.bandwidth_limit_kbps||st.sub?.bandwidth_limit_kbps)+'</td><td>'+badge(t.status)+'</td><td class="actions">'+(t.speed_test?'':'<button class="btn secondary small" data-tunnel-action="start" data-tunnel-id="'+t.id+'">??</button><button class="btn secondary small" data-tunnel-action="stop" data-tunnel-id="'+t.id+'">??</button><button class="btn danger small" data-tunnel-delete="'+t.id+'">??</button>')+'</td></tr>').join('')+'</tbody></table></div>'}
function nodesPage(){return'<section class="page-card"><h2>节点监控</h2><p class="muted">仅展示用户可选节点，不暴露 Agent Token。</p><div class="table-wrap"><table><thead><tr><th>节点</th><th>连接地址</th><th>入口域名</th><th>端口池</th><th>最后在线</th><th>状态</th></tr></thead><tbody>'+st.nodes.map(n=>'<tr><td><b>'+esc(n.name)+'</b><small>ID '+esc(n.id)+'</small></td><td>'+esc(n.server_addr||'-')+'<small>frps '+esc(n.frp_server_port||'-')+'</small></td><td>'+esc(n.frp_entry_domain||'-')+'</td><td>TCP '+esc(n.tcp_port_start)+'-'+esc(n.tcp_port_end)+'<small>UDP '+esc(n.udp_port_start)+'-'+esc(n.udp_port_end)+'</small></td><td>'+time(n.last_seen_at)+'</td><td>'+badge(n.status)+'</td></tr>').join('')+'</tbody></table></div></section>'}
function downloadPage(){return'<div class="two-column wide-left"><section class="page-card accent"><h2>本地客户端下载</h2><p class="muted">本地 Win/Linux 客户端负责同步配置、启动 frpc，并为测速临时打开 benchmark 服务。</p><div class="commercial-grid download-grid"><article class="commercial-card"><b>Windows</b><span>下载后运行 start-client.bat。</span><a class="btn primary" href="/downloads/windows/FrpTunnelClient-0.1.4-windows-amd64.zip">下载 Windows ZIP</a></article><article class="commercial-card"><b>Linux</b><span>适合 NAS 和服务器。</span><a class="btn primary" href="/downloads/linux/FrpTunnelClient-0.1.4-linux-amd64.tar.gz">下载 Linux TAR.GZ</a></article></div></section><section class="page-card"><h2>本地客户端地址</h2><div class="form-stack"><label class="field"><span>Local Client API</span><input class="input" id="localClientBase" value="'+esc(st.local)+'"></label><label class="field"><span>Local API Token</span><input class="input" id="localClientToken" value="'+esc(st.localToken)+'" placeholder="?????? WebUI ??"></label><button class="btn secondary" id="saveLocalClientBtn">保存地址</button></div><div class="code">API 地址：'+esc(apiBase())+'</div></section></div>'}
function helpPage(){return'<div class="two-column"><section class="page-card"><h2>三端职责</h2><dl class="info-list"><dt>后台容器</dt><dd>套餐、用户、节点、支付、兑换码。</dd><dt>用户容器</dt><dd>购买、创建隧道、节点查看、一键测速。</dd><dt>本地客户端</dt><dd>Win/Linux 运行 frpc、同步配置、临时测速服务。</dd></dl></section><section class="page-card accent"><h2>测速说明</h2><p class="muted">真实测速受套餐限速、节点能力、用户本地宽带三者共同影响。</p><a class="btn primary" href="#/app/speedtest" data-route="/app/speedtest">开始测速</a></section></div>'}
function accountPage(){return'<div class="two-column"><section class="page-card"><h2>账号信息</h2><dl class="info-list"><dt>邮箱</dt><dd>'+esc(st.me?.email||'-')+'</dd><dt>套餐</dt><dd>'+esc(st.sub?.plan_name||'未开通')+'</dd><dt>状态</dt><dd>'+esc(st.sub?.status||'inactive')+'</dd><dt>到期</dt><dd>'+time(st.sub?.expires_at)+'</dd></dl></section><section class="page-card"><h2>账号操作</h2><button class="btn danger" id="logoutBtn2">退出当前账号</button></section></div>'}
function domainPage(){return'<div class="two-column wide-left"><section class="page-card accent"><h2>申请 HTTPS 证书</h2><div class="form-stack"><label class="field"><span>域名</span><input class="input" id="certDomain"></label><label class="field"><span>联系邮箱</span><input class="input" id="certEmail" value="'+esc(st.me?.email||'')+'"></label><button class="btn primary" id="requestUserCertBtn">提交证书申请</button></div></section><section class="page-card"><h2>申请结果</h2><div class="log" id="certLog">等待提交</div></section></div>'}
function speedPage(){let opts=(st.nodes.length?st.nodes:[{id:0,name:'默认节点',status:'online'}]).map(n=>'<option value="'+esc(n.id)+'">'+esc(n.name)+'（'+esc(n.status||'online')+'）</option>').join('');return'<div class="two-column wide-left speed-layout"><section class="page-card accent"><h2>一键隧道测速</h2><p class="muted">本地客户端准备临时 benchmark，API Server 创建临时隧道并发起 HTTP/HTTPS/TCP/UDP 探测。测速限速固定继承套餐。</p><div class="form-stack"><label class="field"><span>本地客户端 API</span><input class="input" id="speedLocal" value="'+esc(st.local)+'"></label><label class="field"><span>Local API Token</span><input class="input" id="speedLocalToken" value="'+esc(st.localToken)+'" placeholder="????? Token"></label><label class="field"><span>测速节点</span><select class="input" id="speedNode">'+opts+'</select></label><label class="field"><span>协议</span><select class="input" id="speedType"><option value="tcp">TCP</option><option value="udp">UDP</option><option value="http">HTTP</option><option value="https">HTTPS</option></select></label><div class="inline-form"><label class="field"><span>下载 MB</span><input class="input" id="downMB" value="8" type="number"></label><label class="field"><span>上传 MB</span><input class="input" id="upMB" value="8" type="number"></label></div><div class="code">套餐限速：'+mbps(st.sub?.bandwidth_limit_kbps||0)+'\n瓶颈可能来自套餐限速、节点能力、用户本地宽带。</div><button class="btn primary full" id="runSpeedBtn" '+(st.active?'':'disabled')+'>'+(st.active?'启动真实测速':'请先开通套餐')+'</button><button class="btn secondary full" id="cleanSpeedBtn">清理本地测速服务</button></div></section><section class="page-card"><h2>测速结果</h2><div id="speedResult" class="speed-result"><div class="empty">等待测速</div></div><div class="log" id="speedLog">等待操作</div></section></div>'}
function bindPage(r){if(r==='/app/tunnels'){document.querySelectorAll('[data-tunnel-action]').forEach(b=>b.onclick=async()=>{try{await api('/api/tunnels/'+b.dataset.tunnelId+'/'+b.dataset.tunnelAction,{method:'POST'});render()}catch(e){alert(e.message)}});document.querySelectorAll('[data-tunnel-delete]').forEach(b=>b.onclick=async()=>{if(!confirm('?????? #'+b.dataset.tunnelDelete+'?'))return;try{await api('/api/tunnels/'+b.dataset.tunnelDelete,{method:'DELETE'});render()}catch(e){alert(e.message)}})}if(r==='/app/billing'){document.querySelectorAll('[data-buy-plan]').forEach(b=>b.onclick=async()=>{try{let o=await api('/api/payments/epay/orders',{method:'POST',body:JSON.stringify({plan_id:+b.dataset.buyPlan,pay_type:$('payType').value})}); if(o.pay_url)location.href=o.pay_url; else $('billingLog').textContent=JSON.stringify(o,null,2)}catch(e){$('billingLog').textContent=e.message}});$('redeemBtn').onclick=async()=>{try{let d=await api('/api/user/redeem',{method:'POST',body:JSON.stringify({code:$('redeemCode').value})});$('billingLog').textContent='兑换成功：'+JSON.stringify(d,null,2);render()}catch(e){$('billingLog').textContent=e.message}}}
 if(r==='/app/create'){let l=$('bandwidthLimit');l.oninput=()=>{$('limitHint').textContent=(+l.value>0?'约 '+((+l.value)/8).toFixed(3)+' MB/s':'0 表示继承套餐限速')};$('createTunnelBtn').onclick=async()=>{try{await api('/api/tunnels',{method:'POST',body:JSON.stringify({name:$('tunnelName').value,type:$('tunnelType').value,local_host:$('localHost').value,local_port:+$('localPort').value,domain:$('domain').value,use_https:$('tunnelType').value==='https',bandwidth_limit_kbps:kb(+$('bandwidthLimit').value||0),node_id:+$('tunnelNode').value||0})});go('/app/tunnels')}catch(e){alert(e.message)}}}
 if(r==='/app/download')$('saveLocalClientBtn').onclick=()=>{st.local=$('localClientBase').value.replace(/\/$/,'');localStorage.setItem('localClientBase',st.local);st.localToken=$('localClientToken').value.trim();localStorage.setItem('localClientToken',st.localToken);render()};
 if(r==='/app/account')$('logoutBtn2').onclick=()=>{st.token='';localStorage.removeItem('token');go('/login')};
 if(r==='/app/domains')$('requestUserCertBtn').onclick=async()=>{try{$('certLog').textContent=JSON.stringify(await api('/api/user/certificates/request',{method:'POST',body:JSON.stringify({domain:$('certDomain').value,email:$('certEmail').value})}),null,2)}catch(e){$('certLog').textContent=e.message}};
 if(r==='/app/speedtest'){ $('cleanSpeedBtn').onclick=async()=>{try{st.local=$('speedLocal').value.replace(/\/$/,'');localStorage.setItem('localClientBase',st.local);st.localToken=$('speedLocalToken').value.trim();localStorage.setItem('localClientToken',st.localToken);await localApi('/api/speed-tests/cleanup',{});$('speedLog').textContent='已清理'}catch(e){$('speedLog').textContent=e.message}}; $('runSpeedBtn').onclick=runSpeed }}
function slog(s){let l=$('speedLog');l.textContent=(l.textContent&&l.textContent!=='等待操作'?l.textContent+'\n':'')+new Date().toLocaleTimeString()+'  '+s;l.scrollTop=l.scrollHeight}
function metric(res){let m=res.metrics||{};return'<div class="metric-grid speed-metrics"><article class="metric-card"><span>下载平均</span><strong>'+mbps(m.download_average_kbps)+'</strong><em class="badge blue">峰值 '+mbps(m.download_peak_kbps)+'</em></article><article class="metric-card"><span>上传平均</span><strong>'+mbps(m.upload_average_kbps)+'</strong><em class="badge blue">峰值 '+mbps(m.upload_peak_kbps)+'</em></article><article class="metric-card"><span>延迟</span><strong>'+((+m.latency_ms||0).toFixed(1))+' ms</strong><em class="badge orange">API probe</em></article><article class="metric-card"><span>限速占比</span><strong>'+(((+res.limit_ratio||0)*100).toFixed(0))+'%</strong><em class="badge green">'+mbps(res.effective_bandwidth_limit_kbps)+'</em></article></div><div class="page-card accent inline-result"><b>瓶颈判断</b><p>'+esc(res.bottleneck_hint||'真实测速受套餐限速、节点能力、用户本地宽带共同影响。')+'</p><small>计入流量：入站 '+bytes(m.bytes_in)+' / 出站 '+bytes(m.bytes_out)+'；临时隧道已清理：'+(res.finished?'是':'否')+'</small></div>'}
async function runSpeed(){let btn=$('runSpeedBtn'),tid=0;btn.disabled=true;$('speedLog').textContent='';$('speedResult').innerHTML='<div class="empty">测速进行中...</div>';st.local=$('speedLocal').value.replace(/\/$/,'');localStorage.setItem('localClientBase',st.local);st.localToken=$('speedLocalToken').value.trim();localStorage.setItem('localClientToken',st.localToken);try{slog('1/7 本地客户端准备 benchmark');let p=await localApi('/api/speed-tests/prepare',{type:$('speedType').value});slog('本地服务 '+p.local_host+':'+p.local_port);slog('2/7 创建临时隧道');let t=await api('/api/speed-tests/tunnels',{method:'POST',body:JSON.stringify({type:$('speedType').value,local_host:p.local_host,local_port:p.local_port,node_id:+$('speedNode').value||0,bandwidth_limit_kbps:0})});tid=t.id;slog('临时入口 '+t.public_url);slog('3/7 同步临时配置');await localApi('/api/config/sync',{api_base:apiBase(),token:st.token,speed_test_id:tid});slog('4/7 重启 frpc');await localApi('/api/frpc/restart',{});await new Promise(r=>setTimeout(r,1200));slog('5/7 API Server 发起测速');let mb=1024*1024,res=await api('/api/speed-tests/'+tid+'/run',{method:'POST',body:JSON.stringify({download_bytes:(+$('downMB').value||8)*mb,upload_bytes:(+$('upMB').value||8)*mb,duration_seconds:45})});$('speedResult').innerHTML=metric(res);slog('测速完成');slog('6/7 恢复正式配置');await localApi('/api/config/sync',{api_base:apiBase(),token:st.token});await localApi('/api/frpc/restart',{});slog('7/7 清理 benchmark');await localApi('/api/speed-tests/cleanup',{})}catch(e){slog('失败：'+e.message);if(tid)try{await api('/api/speed-tests/'+tid+'/finish',{method:'POST'});slog('已清理远端临时隧道')}catch{};try{await localApi('/api/speed-tests/cleanup',{})}catch{};$('speedResult').innerHTML='<div class="empty">测速失败：'+esc(e.message)+'</div>'}finally{btn.disabled=!st.active}}
async function render(){let r=norm(route());if(r!==route())return go(r); if(r==='/login')return auth('login'); if(r==='/register')return auth('register'); if(r.startsWith('/app'))return consolePage(r); landing()}
window.addEventListener('hashchange',render);render();
</script></body></html>
