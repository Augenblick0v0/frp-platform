<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FRP Client</title><link rel="stylesheet" href="style.css"></head><body><div class="shell"><aside class="side"><div class="brand"><div class="logo"></div>FRP Client</div><nav class="nav"><a class="active">连接状态</a><a>新增隧道</a><a>日志</a><a>订阅</a><a>设置</a></nav></aside><main class="main"><div class="top"><div><div class="eyebrow">Local WebUI</div><h1 class="title">客户端控制台</h1><p class="subtitle">Linux WebUI / Windows 安装包内置页面，负责同步配置、启动 frpc 和查看日志。</p></div><div><button class="btn secondary" id="stopBtn">停止</button> <button class="btn primary" id="startBtn">启动 frpc</button></div></div><section class="grid cards"><div class="card"><div class="label">本地 API</div><div class="metric">正常</div><span class="badge green" id="apiBadge">online</span></div><div class="card"><div class="label">frpc</div><div class="metric" id="frpcState">未知</div><span class="badge orange" id="frpcBadge">checking</span></div><div class="card"><div class="label">PID</div><div class="metric" id="pid">-</div><span class="badge blue">process</span></div><div class="card"><div class="label">配置文件</div><div class="label" id="configPath">-</div><span class="badge green">toml</span></div></section><section class="split" style="margin-top:16px"><div class="card"><h2>从服务端同步配置</h2><div class="form"><input class="input" id="apiBase" placeholder="API 地址，例如 https://api.example.com"><input class="input" id="token" placeholder="登录 Token"><button class="btn primary" id="syncBtn">同步并生成 frpc.toml</button></div><h2>或手动渲染测试配置</h2><button class="btn secondary" id="demoBtn">写入 Demo TCP 配置</button></div><div class="card"><h2>运行日志</h2><div class="log" id="logs">loading...</div></div></section></main></div><script>
async function api(path, opts={}){const r=await fetch(path,{headers:{'Content-Type':'application/json'},...opts});return await r.json()}
function setBadge(el, text, cls){el.textContent=text;el.className='badge '+cls}
async function refresh(){try{const res=await api('/api/status');const st=res.data;document.getElementById('frpcState').textContent=st.running?'运行中':'停止';document.getElementById('pid').textContent=st.pid||'-';document.getElementById('configPath').textContent=st.config_path;setBadge(document.getElementById('frpcBadge'),st.running?'running':'stopped',st.running?'green':'red');const logs=await api('/api/logs');document.getElementById('logs').textContent=logs.data.logs||'[empty]'}catch(e){setBadge(document.getElementById('apiBadge'),'offline','red')}}
document.getElementById('syncBtn').onclick=async()=>{const apiBase=document.getElementById('apiBase').value;const token=document.getElementById('token').value;const res=await api('/api/config/sync',{method:'POST',body:JSON.stringify({api_base:apiBase,token})});document.getElementById('logs').textContent=JSON.stringify(res,null,2);refresh()}
document.getElementById('demoBtn').onclick=async()=>{const cfg={server_addr:'frp.example.com',server_port:7000,token:'runtime-token',tunnels:[{id:1,name:'ssh',type:'tcp',local_host:'127.0.0.1',local_port:22,remote_port:20000,status:'active'}]};const res=await api('/api/config/render',{method:'POST',body:JSON.stringify(cfg)});document.getElementById('logs').textContent=res.data?res.data.config:JSON.stringify(res,null,2);refresh()}
document.getElementById('startBtn').onclick=async()=>{const res=await api('/api/frpc/start',{method:'POST'});document.getElementById('logs').textContent=JSON.stringify(res,null,2);refresh()}
document.getElementById('stopBtn').onclick=async()=>{const res=await api('/api/frpc/stop',{method:'POST'});document.getElementById('logs').textContent=JSON.stringify(res,null,2);refresh()}
refresh();setInterval(refresh,5000)
</script></body></html>
