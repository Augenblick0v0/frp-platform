<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FRP Client</title><link rel="stylesheet" href="style.css"></head><body><div class="shell"><aside class="side"><div class="brand"><div class="logo"></div>FRP Client</div><nav class="nav"><a class="active">连接状态</a><a>新增隧道</a><a>日志</a><a>订阅</a><a>设置</a></nav></aside><main class="main"><div class="top"><div><div class="eyebrow">Local WebUI</div><h1 class="title">客户端控制台</h1><p class="subtitle">Linux WebUI / Windows 安装包内置页面，负责登录、兑换、创建隧道和管理 frpc。</p></div><button class="btn primary">启动全部</button></div><section class="grid cards"><div class="card"><div class="label">API 连接</div><div class="metric">正常</div><span class="badge green">online</span></div><div class="card"><div class="label">frpc</div><div class="metric">停止</div><span class="badge red">stopped</span></div><div class="card"><div class="label">隧道</div><div class="metric">0</div><span class="badge blue">configured</span></div><div class="card"><div class="label">订阅</div><div class="metric">有效</div><span class="badge green">active</span></div></section><section class="split" style="margin-top:16px"><div class="card"><h2>新增隧道</h2><div class="form"><input class="input" placeholder="隧道名称"><input class="input" placeholder="协议：tcp / udp / http / https"><input class="input" placeholder="本地地址"><input class="input" placeholder="本地端口"><input class="input" placeholder="HTTP/HTTPS 域名，可选"><button class="btn primary">提交到服务端</button></div></div><div class="card"><h2>运行日志</h2><div class="log">[info] waiting for login...\n[info] frpc manager ready\n[info] tunnel config will be pulled from server</div></div></section></main></div></body></html>
