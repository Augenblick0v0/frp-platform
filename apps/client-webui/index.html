<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FRP Client</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <aside class="side">
      <div class="brand"><div class="logo"></div>FRP Client</div>
      <nav class="nav">
        <a class="active">连接状态</a>
        <a>隧道测速</a>
        <a>日志</a>
        <a>订阅</a>
        <a>设置</a>
      </nav>
    </aside>
    <main class="main">
      <div class="top">
        <div>
          <div class="eyebrow">Local WebUI</div>
          <h1 class="title">客户端控制台</h1>
          <p class="subtitle">同步配置、启动 frpc、测试 TCP / UDP / HTTP / HTTPS 隧道速度。</p>
        </div>
        <div class="actions">
          <button class="btn secondary" id="stopBtn">停止</button>
          <button class="btn primary" id="startBtn">启动 frpc</button>
        </div>
      </div>

      <section class="grid cards">
        <div class="card"><div class="label">本地 API</div><div class="metric">正常</div><span class="badge green" id="apiBadge">online</span></div>
        <div class="card"><div class="label">frpc</div><div class="metric" id="frpcState">未知</div><span class="badge orange" id="frpcBadge">checking</span></div>
        <div class="card"><div class="label">PID</div><div class="metric" id="pid">-</div><span class="badge blue">process</span></div>
        <div class="card"><div class="label">配置文件</div><div class="label path" id="configPath">-</div><span class="badge green">toml</span></div>
      </section>

      <section class="split" style="margin-top:16px">
        <div class="card">
          <h2>服务端连接</h2>
          <div class="form">
            <input class="input" id="apiBase" placeholder="API 地址，例如 https://api.example.com">
            <input class="input" id="token" placeholder="登录 Token">
            <button class="btn primary" id="syncBtn">同步并生成 frpc.toml</button>
          </div>

          <h2>隧道测速</h2>
          <div class="speed-grid">
            <label>协议
              <select class="input" id="speedType">
                <option value="tcp">TCP</option>
                <option value="udp">UDP</option>
                <option value="http">HTTP</option>
                <option value="https">HTTPS</option>
              </select>
            </label>
            <label>下载大小 bytes
              <input class="input" id="downloadBytes" value="8388608">
            </label>
            <label>上传大小 bytes
              <input class="input" id="uploadBytes" value="8388608">
            </label>
            <label>持续秒数
              <input class="input" id="durationSeconds" value="15">
            </label>
            <label>隧道限速 Kbps
              <input class="input" id="speedLimit" value="0" placeholder="0 表示继承套餐限速">
            </label>
          </div>
          <div class="hint">测速会创建临时隧道，产生的流量会计入当前套餐。隧道限速不能超过套餐限速。</div>
          <button class="btn secondary" id="speedTestBtn">开始测速</button>
          <div class="result-grid" id="speedResult">
            <div><span>下载平均</span><strong>-</strong></div>
            <div><span>下载峰值</span><strong>-</strong></div>
            <div><span>上传平均</span><strong>-</strong></div>
            <div><span>上传峰值</span><strong>-</strong></div>
            <div><span>延迟</span><strong>-</strong></div>
            <div><span>限速对比</span><strong>-</strong></div>
          </div>

          <h2>手动流量上报</h2>
          <input class="input" id="reportTunnelId" placeholder="隧道 ID">
          <input class="input" id="bytesIn" value="1024" placeholder="入站 bytes">
          <input class="input" id="bytesOut" value="2048" placeholder="出站 bytes">
          <button class="btn secondary" id="reportTrafficBtn">上报到服务端</button>
        </div>
        <div class="card">
          <h2>运行日志</h2>
          <div class="log" id="logs">loading...</div>
        </div>
      </section>
    </main>
  </div>
<script>
async function api(path, opts = {}) {
  const r = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return await r.json();
}
function setBadge(el, text, cls) { el.textContent = text; el.className = 'badge ' + cls; }
function num(id) { return Number(document.getElementById(id).value) || 0; }
function fmtKbps(v) {
  if (!v || v < 0) return '-';
  if (v >= 1000) return (v / 1000).toFixed(2) + ' Mbps';
  return v.toFixed(0) + ' Kbps';
}
function setResult(items) {
  const cells = document.querySelectorAll('#speedResult strong');
  cells[0].textContent = fmtKbps(items.download_average_kbps);
  cells[1].textContent = fmtKbps(items.download_peak_kbps);
  cells[2].textContent = fmtKbps(items.upload_average_kbps);
  cells[3].textContent = fmtKbps(items.upload_peak_kbps);
  cells[4].textContent = items.latency_ms ? items.latency_ms.toFixed(1) + ' ms' : '-';
  if (items.effective_bandwidth_limit_kbps > 0) {
    const pct = (items.limit_ratio * 100).toFixed(0);
    cells[5].textContent = pct + '% of ' + fmtKbps(items.effective_bandwidth_limit_kbps);
  } else {
    cells[5].textContent = '未限速';
  }
}
async function refresh() {
  try {
    const res = await api('/api/status');
    const st = res.data;
    document.getElementById('frpcState').textContent = st.running ? '运行中' : '停止';
    document.getElementById('pid').textContent = st.pid || '-';
    document.getElementById('configPath').textContent = st.config_path;
    setBadge(document.getElementById('frpcBadge'), st.running ? 'running' : 'stopped', st.running ? 'green' : 'red');
    const logs = await api('/api/logs');
    document.getElementById('logs').textContent = logs.data.logs || '[empty]';
  } catch (e) {
    setBadge(document.getElementById('apiBadge'), 'offline', 'red');
  }
}
document.getElementById('syncBtn').onclick = async () => {
  const apiBase = document.getElementById('apiBase').value;
  const token = document.getElementById('token').value;
  const res = await api('/api/config/sync', { method: 'POST', body: JSON.stringify({ api_base: apiBase, token }) });
  document.getElementById('logs').textContent = JSON.stringify(res, null, 2);
  refresh();
};
document.getElementById('speedTestBtn').onclick = async () => {
  const btn = document.getElementById('speedTestBtn');
  btn.disabled = true;
  btn.textContent = '测速中...';
  const payload = {
    api_base: document.getElementById('apiBase').value,
    token: document.getElementById('token').value,
    type: document.getElementById('speedType').value,
    download_bytes: num('downloadBytes'),
    upload_bytes: num('uploadBytes'),
    duration_seconds: num('durationSeconds'),
    bandwidth_limit_kbps: num('speedLimit')
  };
  try {
    const res = await api('/api/speed-tests/run', { method: 'POST', body: JSON.stringify(payload) });
    document.getElementById('logs').textContent = JSON.stringify(res, null, 2);
    if (res.success) setResult(res.data);
  } finally {
    btn.disabled = false;
    btn.textContent = '开始测速';
    refresh();
  }
};
document.getElementById('startBtn').onclick = async () => {
  const res = await api('/api/frpc/start', { method: 'POST' });
  document.getElementById('logs').textContent = JSON.stringify(res, null, 2);
  refresh();
};
document.getElementById('stopBtn').onclick = async () => {
  const res = await api('/api/frpc/stop', { method: 'POST' });
  document.getElementById('logs').textContent = JSON.stringify(res, null, 2);
  refresh();
};
document.getElementById('reportTrafficBtn').onclick = async () => {
  const apiBase = document.getElementById('apiBase').value;
  const token = document.getElementById('token').value;
  const report = { tunnel_id: num('reportTunnelId'), bytes_in: num('bytesIn'), bytes_out: num('bytesOut') };
  const res = await api('/api/traffic/report', { method: 'POST', body: JSON.stringify({ api_base: apiBase, token, reports: [report] }) });
  document.getElementById('logs').textContent = JSON.stringify(res, null, 2);
  refresh();
};
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
